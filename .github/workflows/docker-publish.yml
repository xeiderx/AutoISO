name: Build and Publish Docker Image

# 触发条件：当你往 main 分支 push 代码时，机器人自动开工
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # 机器人使用最新的 Ubuntu 系统

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 第一步：机器人拉取你的最新代码

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # 第二步：机器人准备好 Docker 打包环境

      - name: Login to Docker Hub
        uses: docker/login-action@v3 # 第三步：机器人用你刚才存的秘密登录 Docker Hub
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5 # 第四步：机器人根据你的 Dockerfile 打包并推送到 Docker Hub
        with:
          context: .
          push: true
          # 这里会自动读取你的用户名，打包成 yourusername/autoiso:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/autoiso:latest