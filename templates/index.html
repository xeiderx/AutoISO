<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoISO 管理台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .card { box-shadow: 0 4px 16px rgba(0,0,0,.06); border: none; }
    .table-wrap { max-height: 74vh; overflow: auto; }
    .status-success { color: #198754; font-weight: 600; }
    .status-failed { color: #dc3545; font-weight: 600; }
    .status-processing { color: #fd7e14; font-weight: 600; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  </style>
</head>
<body>
<div class="container-fluid py-4">
  <div class="row g-3">
    <div class="col-lg-4">
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">节点管理</h5>
          <form id="qbForm" class="row g-2">
            <div class="col-12"><input class="form-control" name="name" placeholder="节点别名" required></div>
            <div class="col-12"><input class="form-control" name="url" placeholder="http://qb-host:8080" required></div>
            <div class="col-6"><input class="form-control" name="username" placeholder="账号" required></div>
            <div class="col-6"><input class="form-control" name="password" placeholder="密码" type="password" required></div>
            <div class="col-12 d-grid"><button class="btn btn-primary" type="submit">添加节点</button></div>
          </form>
          <hr>
          <div id="qbList" class="small"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Telegram 设置</h5>
          <form id="tgForm" class="row g-2">
            <div class="col-12"><input class="form-control mono" name="tg_token" placeholder="Bot Token" required></div>
            <div class="col-12"><input class="form-control mono" name="tg_chat_id" placeholder="Chat ID" required></div>
            <div class="col-12 d-grid"><button class="btn btn-success" type="submit">保存并发送测试消息</button></div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="card-title mb-0">封装历史（最近50条）</h5>
            <button class="btn btn-outline-secondary btn-sm" id="refreshBtn">立即刷新</button>
          </div>
          <div class="table-wrap">
            <table class="table table-sm table-striped align-middle">
              <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>任务名</th>
                <th>节点</th>
                <th>状态</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>信息</th>
              </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  async function api(url, options = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || '请求失败');
    return data;
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }

  async function loadServers() {
    const list = await api('/api/qbservers');
    const el = document.getElementById('qbList');
    if (!list.length) {
      el.innerHTML = '<div class="text-muted">暂无节点</div>';
      return;
    }
    el.innerHTML = list.map(x => `
      <div class="border rounded p-2 mb-2">
        <div><strong>${escapeHtml(x.name)}</strong></div>
        <div class="text-muted mono">${escapeHtml(x.url)}</div>
        <div class="text-muted">账号: ${escapeHtml(x.username)}</div>
        <button class="btn btn-sm btn-outline-danger mt-2" onclick="deleteServer(${x.id})">删除</button>
      </div>
    `).join('');
  }

  async function deleteServer(id) {
    if (!confirm('确认删除该节点？')) return;
    await api(`/api/qbservers/${id}`, { method: 'DELETE' });
    await loadServers();
  }

  async function loadTG() {
    const data = await api('/api/settings/telegram');
    const form = document.getElementById('tgForm');
    form.tg_token.value = data.tg_token || '';
    form.tg_chat_id.value = data.tg_chat_id || '';
  }

  function statusClass(status) {
    if (status === 'Success') return 'status-success';
    if (status === 'Failed') return 'status-failed';
    return 'status-processing';
  }

  async function loadHistory() {
    const list = await api('/api/history?limit=50');
    const body = document.getElementById('historyBody');
    body.innerHTML = list.map(x => `
      <tr>
        <td>${x.id}</td>
        <td>${escapeHtml(x.task_name)}</td>
        <td>${escapeHtml(x.qb_server_name || '')}</td>
        <td class="${statusClass(x.status)}">${escapeHtml(x.status)}</td>
        <td>${escapeHtml(x.start_time || '')}</td>
        <td>${escapeHtml(x.end_time || '')}</td>
        <td title="${escapeHtml(x.message || '')}">${escapeHtml((x.message || '').slice(0, 60))}</td>
      </tr>
    `).join('');
  }

  document.getElementById('qbForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    await api('/api/qbservers', {
      method: 'POST',
      body: JSON.stringify({
        name: f.name.value,
        url: f.url.value,
        username: f.username.value,
        password: f.password.value,
      })
    });
    f.reset();
    await loadServers();
    alert('节点添加成功');
  });

  document.getElementById('tgForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    await api('/api/settings/telegram', {
      method: 'POST',
      body: JSON.stringify({
        tg_token: f.tg_token.value,
        tg_chat_id: f.tg_chat_id.value,
      })
    });
    alert('保存成功，测试消息已发送');
  });

  document.getElementById('refreshBtn').addEventListener('click', loadHistory);

  async function boot() {
    try {
      await loadServers();
      await loadTG();
      await loadHistory();
    } catch (e) {
      alert(e.message);
    }
    setInterval(loadHistory, 10000);
  }

  boot();
</script>
</body>
</html>
