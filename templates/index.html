s="col-md-4"><input class="form-control" name="upload_cron" placeholder="Cron"></div><div class="col-md-8"><input class="form-control" name="clouddrive_path" placeholder="网盘路径"></div><div class="col-12"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="delete_after_upload" id="delete_after_upload"><label class="form-check-label" for="delete_after_upload">上传后删除本地</label></div></div><div class="col-12 border rounded p-2 bg-light"><div class="small fw-semibold mb-1">Telegram 通知设置</div><div class="row g-2"><div class="col-md-3"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="notify_pack_start" id="notify_pack_start"><label class="form-check-label" for="notify_pack_start">封装开始</label></div></div><div class="col-md-3"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="notify_pack_end" id="notify_pack_end"><label class="form-check-label" for="notify_pack_end">封装完成</label></div></div><div class="col-md-3"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="notify_upload_start" id="notify_upload_start"><label class="form-check-label" for="notify_upload_start">上传开始</label></div></div><div class="col-md-3"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="notify_upload_end" id="notify_upload_end"><label class="form-check-label" for="notify_upload_end">上传完成</label></div></div></div></div><div class="col-12 text-end"><button class="btn btn-primary">保存系统设置</button></div></form></div></div></section>
<section id="viewHistory" class="app-view d-none"><div class="card"><div class="card-body"><div class="d-flex justify-content-between mb-2"><h6 class="mb-0">历史记录</h6><div><button class="btn btn-sm btn-outline-secondary" id="btnRefreshHistory">刷新</button> <button class="btn btn-sm btn-outline-danger" id="btnBatchDelete">批量删除</button> <select id="pageSizeSelect" class="form-select form-select-sm d-inline-block" style="width:auto"><option value="20">20</option><option value="50" selected>50</option><option value="100">100</option><option value="all">全部</option></select></div></div><div class="table-wrap"><table id="historyTable" class="table table-sm resizable-table"><thead><tr><th><input type="checkbox" id="historyCheckAll"></th><th>ID</th><th>任务名</th><th>节点</th><th>状态</th><th>大小</th><th>封装耗时</th><th>封装开始</th><th>封装结束</th><th>上传开始</th><th>上传结束</th><th>上传耗时</th></tr></thead><tbody id="historyBody"><tr><td colspan="12" class="text-center text-muted">加载中...</td></tr></tbody></table></div><div class="d-flex justify-content-between mt-2"><button id="btnPrevPage" class="btn btn-sm btn-outline-secondary">上一页</button><div id="pageInfo" class="small">1 / 1</div><button id="btnNextPage" class="btn btn-sm btn-outline-secondary">下一页</button></div></div></div></section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script>
const toast=new bootstrap.Toast(document.getElementById('toast')),logModal=new bootstrap.Modal(document.getElementById('logModal')),confirmModalEl=document.getElementById('confirmModal'),confirmModal=new bootstrap.Modal(confirmModalEl);let confirmResolver=null,allHistoryData=[],currentPage=1,pageSize=50;function showNotification(m,t='primary'){const e=document.getElementById('toast');e.className=`toast text-bg-${t} border-0`;document.getElementById('toastBody').textContent=m||'完成';toast.show()}function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}async function ask(m,t='请确认',d=true){document.getElementById('confirmTitle').textContent=t;document.getElementById('confirmMessage').textContent=m;document.getElementById('confirmOkBtn').className=`btn ${d?'btn-danger':'btn-primary'}`;return new Promise(r=>{confirmResolver=r;confirmModal.show()})}document.getElementById('confirmOkBtn').onclick=()=>{if(confirmResolver)confirmResolver(true);confirmResolver=null;confirmModal.hide()};confirmModalEl.addEventListener('hidden.bs.modal',()=>{if(confirmResolver)confirmResolver(false);confirmResolver=null});async function api(u,o={}){const i={method:o.method||'GET',headers:{'Content-Type':'application/json',...(o.headers||{})}};if(o.body!==undefined)i.body=o.body;const r=await fetch(u,i),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||`HTTP ${r.status}`);return d}function fmtS(s){if(s===null||s===undefined)return '-';s=Math.max(0,Number(s));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=Math.floor(s%60);return h>0?`${h}h ${m}m ${x}s`:(m>0?`${m}m ${x}s`:`${x}s`)}function fmtDT(v){const r=String(v||'').trim();if(!r)return '<span class="text-muted">-</span>';const[a,b='']=r.split(' ');return `<span class="cell-date">${esc(a)}</span><span class="cell-time">${esc(b||'-')}</span>`}function badge(s){if(s==='封装完成，待上传'||s==='待上传')return '<span class="badge rounded-pill text-bg-info">待上传</span>';if(s==='上传中')return '<span class="badge rounded-pill text-bg-warning">上传中</span>';if(s==='已上传至网盘')return '<span class="badge rounded-pill text-bg-success">已上传</span>';if(s==='Failed')return '<span class="badge rounded-pill text-bg-danger">失败</span>';if(s==='本地已删除')return '<span class="badge rounded-pill text-bg-dark">本地已删除</span>';return `<span class="badge rounded-pill text-bg-secondary">${esc(s||'处理中')}</span>`}
async function loadStats(){const s=await api('/api/stats'),p=s.pack||{},u=s.upload||{};document.getElementById('statsCards').innerHTML=`<div class='col-12'><div class='row g-2'><div class='col-md-2'><div class='card'><div class='card-body text-primary fw-bold'>封装</div></div></div><div class='col-md-10'><div class='row g-2'><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>总次数</small><div>${p.total_count||0}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>总数据</small><div>${esc(p.total_size_text||'0')}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>平均耗时</small><div>${esc(p.avg_duration_text||'-')}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>平均速率</small><div>${esc(p.avg_rate_text||'0 MB/s')}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>本月次数</small><div>${p.month_count||0}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>本月数据</small><div>${esc(p.month_size_text||'0')}</div></div></div></div></div></div></div></div><div class='col-12'><div class='row g-2'><div class='col-md-2'><div class='card'><div class='card-body text-success fw-bold'>上传</div></div></div><div class='col-md-10'><div class='row g-2'><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>总次数</small><div>${u.total_count||0}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>总数据</small><div>${esc(u.total_size_text||'0')}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>平均耗时</small><div>${esc(u.avg_duration_text||'-')}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>平均速率</small><div>${esc(u.avg_rate_text||'0 MB/s')}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>本月次数</small><div>${u.month_count||0}</div></div></div></div><div class='col-6 col-lg-4 col-xxl-2'><div class='card'><div class='card-body'><small class='text-muted'>本月数据</small><div>${esc(u.month_size_text||'0')}</div></div></div></div></div></div></div></div>`}
async function loadProgress(){const[pk,s]=await Promise.all([api('/api/progress'),api('/api/stats')]);document.getElementById('packingTasks').innerHTML=!pk.active?'<div class="text-muted">No active packing task</div>':pk.tasks.map(t=>`<div class='border rounded p-2 mb-2 bg-light'><div class='fw-semibold'>Packing: ${esc(t.task_name)}</div><div class='small text-muted'>Node: ${esc(t.server_name)} | Elapsed: ${fmtS(t.elapsed_seconds)}</div><div class='progress mt-1' style='height:10px'><div class='progress-bar progress-bar-striped progress-bar-animated' style='width:${t.progress}%'></div></div><div class='small text-muted mt-1'>Speed: ${Number(t.speed_mbps||0).toFixed(2)} MB/s | ETA: ${esc(t.eta_text||'-')} | 进度: ${Number(t.progress||0).toFixed(2)}%</div></div>`).join('');const up=s.upload_progress||{},st=s.current_upload_status||{},b=document.getElementById('uploadTaskStatus');if(!up.active){b.innerHTML='<div class="text-muted">No active upload task</div>';return}const p=Number(up.percentage||0).toFixed(2),pause=st.status==='paused'||up.status==='paused';b.innerHTML=`<div class='border rounded p-2 ${pause?'bg-secondary-subtle':'bg-warning-subtle'}'><div class='fw-semibold'>${pause?'已暂停':'上传中'}: ${esc(up.file_name||'')}</div><div class='progress mt-1' style='height:10px'><div class='progress-bar ${pause?'bg-secondary':'bg-warning'}' style='width:${p}%'></div></div><div class='small text-muted mt-1 d-flex justify-content-between flex-wrap gap-2'><span>Speed: ${Number(up.speed_mbps||0).toFixed(2)} MB/s | ETA: ${esc(up.eta||'-')} | 进度: ${p}%</span><span><button class='btn btn-sm ${pause?'btn-success':'btn-outline-warning'}' onclick="toggleUploadControl('${pause?'resume':'pause'}')">${pause?'继续':'暂停'}</button> <button class='btn btn-sm btn-danger' onclick="toggleUploadControl('abort')">中止</button></span></div></div>`}
async function loadPending(){const r=await api('/api/pending'),tb=document.getElementById('pendingBody');tb.innerHTML=!r.length?'<tr><td colspan="5" class="text-center text-muted">暂无待封装任务</td></tr>':r.map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x.node_alias||'')}</td><td>${esc(x.title||'')}</td><td>${Number(x.size_gb||0).toFixed(2)}</td><td>${esc(x.added_on||'')}</td></tr>`).join('')}
async function loadPendingUploads(){const[r,s]=await Promise.all([api('/api/pending_uploads'),api('/api/stats')]),cur=s.current_uploading_file||'',tb=document.getElementById('pendingUploadsBody');tb.innerHTML=!r.length?'<tr><td colspan="6" class="text-center text-muted">暂无待上传任务</td></tr>':r.map((x,i)=>{const u=(x.status||'')==='uploaded',busy=(x.filename||'')===cur;return `<tr><td>${i+1}</td><td>${esc(x.node||'NAS')}</td><td>${esc(x.filename||'')}</td><td>${Number(x.size||x.size_gb||0).toFixed(2)}</td><td>${u?'<span class="badge rounded-pill bg-success">已上传</span>':'<span class="badge rounded-pill bg-secondary">待上传</span>'}</td><td><button class='btn btn-sm ${u?'btn-warning':'btn-outline-primary'}' ${busy?'disabled':''} onclick="uploadNow('${encodeURIComponent(x.filename||'')}')">${busy?'上传中':(u?'重新上传':'立即上传')}</button> <button class='btn btn-sm btn-danger' ${busy?'disabled':''} onclick="deleteLocalFile('${encodeURIComponent(x.filename||'')}')">删除本地</button></td></tr>`}).join('')}
async function uploadNow(n){try{n=decodeURIComponent(n||'');if(!n)return;await api(`/api/upload_now/${encodeURIComponent(n)}`,{method:'POST'});showNotification('上传任务已触发','success');await loadProgress()}catch(e){showNotification(e.message,'danger')}}async function toggleUploadControl(a){try{await api('/api/upload/control',{method:'POST',body:JSON.stringify({action:a})});showNotification(a==='abort'?'上传已中止':(a==='pause'?'上传已暂停':'上传已恢复'),a==='abort'?'warning':'success');if(a==='abort')document.getElementById('uploadTaskStatus').innerHTML='<div class="text-muted">No active upload task</div>';await loadProgress();await loadPendingUploads()}catch(e){showNotification(e.message,'danger')}}async function deleteLocalFile(n){n=decodeURIComponent(n||'');if(!n)return;const ok=await ask('危险操作：确定要彻底删除本地的源文件吗？此操作不可逆！','删除本地文件',true);if(!ok)return;try{await api(`/api/delete_local/${encodeURIComponent(n)}`,{method:'POST'});showNotification('本地文件已删除','success');await loadPendingUploads()}catch(e){showNotification(e.message,'danger')}}
function setQbFormMode(edit){const b=document.getElementById('qbSubmitBtn'),t=document.getElementById('qbSubmitText'),i=b.querySelector('i');if(edit){b.classList.replace('btn-primary','btn-warning');t.textContent='保存修改';i.className='bi bi-check2-circle me-1'}else{b.classList.replace('btn-warning','btn-primary');t.textContent='添加节点';i.className='bi bi-plus-circle me-1'}}function resetQbForm(){const f=document.getElementById('qbForm');f.reset();f.qb_id.value='';setQbFormMode(false)}
async function loadServers(){const r=await api('/api/qbservers'),el=document.getElementById('qbList');el.innerHTML=!r.length?'<div class="text-muted">暂无节点</div>':r.map(x=>`<div class='border rounded p-2 mb-2 bg-white d-flex justify-content-between'><div><div class='fw-semibold'>${esc(x.name)}</div><div class='small text-muted mono'>${esc(x.url)}</div><div class='small text-muted'>账号: ${esc(x.username)}</div></div><div><button class='btn btn-sm btn-outline-primary' onclick='editServer(${JSON.stringify(x)})'><i class='bi bi-pencil'></i></button> <button class='btn btn-sm btn-outline-danger' onclick='deleteServer(${x.id})'><i class='bi bi-trash'></i></button></div></div>`).join('')}function editServer(r){const f=document.getElementById('qbForm');f.qb_id.value=r.id;f.alias.value=r.name||'';f.url.value=r.url||'';f.username.value=r.username||'';f.password.value='';setQbFormMode(true)}async function deleteServer(id){const ok=await ask('确认删除该 qB 节点？','删除节点',true);if(!ok)return;await api(`/api/qbservers/${id}`,{method:'DELETE'});showNotification('节点已删除','success');await loadServers();resetQbForm()}
async function loadTgSettings(){const d=await api('/api/settings/telegram'),f=document.getElementById('tgForm');f.tg_token.value=d.tg_token||'';f.tg_chat_id.value=d.tg_chat_id||'';f.tg_proxy.value=d.tg_proxy||''}async function loadSystemSettings(){const d=await api('/api/settings/system'),f=document.getElementById('systemForm');f.auth_username.value=d.auth_username||'';f.auth_password.value='';f.auth_password_confirm.value='';f.upload_cron.value=d.upload_cron||'0 2 * * *';f.clouddrive_path.value=d.clouddrive_path||'/CloudNAS/115/电影备份';f.delete_after_upload.checked=!!d.delete_after_upload;f.notify_pack_start.checked=!!d.notify_pack_start;f.notify_pack_end.checked=!!d.notify_pack_end;f.notify_upload_start.checked=!!d.notify_upload_start;f.notify_upload_end.checked=!!d.notify_upload_end}
async function fetchHistory(skip=false){if(skip&&document.querySelectorAll('.history-checkbox:checked').length>0)return;allHistoryData=await api('/api/history?limit=0');renderHistory()}function renderHistory(){const size=pageSize==='all'?(allHistoryData.length||1):Number(pageSize||50),tp=pageSize==='all'?1:Math.max(1,Math.ceil(allHistoryData.length/size));currentPage=Math.max(1,Math.min(currentPage,tp));const rows=allHistoryData.slice((currentPage-1)*size,(currentPage-1)*size+size),tb=document.getElementById('historyBody');tb.innerHTML=!rows.length?'<tr><td colspan="12" class="text-center text-muted">暂无历史记录</td></tr>':rows.map(r=>`<tr><td><input type='checkbox' class='history-checkbox' value='${r.id}'></td><td>${r.id}</td><td>${esc(r.task_name||'')}</td><td>${esc(r.qb_server_name||'')}</td><td>${badge(r.status)}</td><td>${Number(r.file_size_gb||0).toFixed(2)}</td><td>${fmtS(r.duration_seconds)}</td><td>${fmtDT(r.start_time||'')}</td><td>${fmtDT(r.end_time||'')}</td><td>${fmtDT(r.upload_start_time||'')}</td><td>${fmtDT(r.upload_end_time||'')}</td><td>${fmtS(r.upload_duration_seconds)}</td></tr>`).join('');document.getElementById('pageInfo').textContent=`${currentPage} / ${tp}`;document.getElementById('btnPrevPage').disabled=currentPage<=1;document.getElementById('btnNextPage').disabled=currentPage>=tp}
async function batchDeleteHistory(){const ids=[...document.querySelectorAll('.history-checkbox:checked')].map(x=>Number(x.value));if(!ids.length)return showNotification('请先选择要删除的记录','warning');const ok=await ask('危险操作：确定要删除选中的历史记录吗？此操作不可逆！','批量删除历史',true);if(!ok)return;await api('/api/history/delete',{method:'POST',body:JSON.stringify({ids})});showNotification('历史记录已删除','success');await fetchHistory(false)}
async function loadLogs(){const pre=document.getElementById('logContent');pre.textContent='日志加载中...';const d=await api('/api/logs');pre.textContent=(Array.isArray(d.logs)&&d.logs.length)?d.logs.join('\n\n'):'最近24小时暂无日志'}
function initResize(){document.querySelectorAll('table.resizable-table').forEach(t=>{if(t.dataset.rs==='1')return;t.dataset.rs='1';(t.querySelectorAll('thead th')||[]).forEach((th,i)=>{const k=`col-width:${t.id||'t'}:${i}`,s=localStorage.getItem(k);if(s){th.style.width=`${Number(s)}px`;th.style.minWidth=`${Number(s)}px`}const h=document.createElement('span');h.className='col-resize-handle';th.appendChild(h);h.addEventListener('mousedown',e=>{e.preventDefault();const sx=e.clientX,sw=th.offsetWidth,mv=ev=>{const w=Math.max(80,sw+ev.clientX-sx);th.style.width=`${w}px`;th.style.minWidth=`${w}px`},up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);localStorage.setItem(k,String(th.offsetWidth))};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)})})})}
async function refreshAll(){try{await Promise.all([loadStats(),loadProgress(),loadPending(),loadPendingUploads(),loadServers(),loadTgSettings(),loadSystemSettings(),fetchHistory(false)])}catch(e){showNotification(e.message,'danger')}}
document.getElementById('qbForm').addEventListener('submit',async e=>{e.preventDefault();const f=e.target,id=(f.qb_id.value||'').trim(),a=(f.alias.value||'').trim(),u=(f.url.value||'').trim(),n=(f.username.value||'').trim(),p=(f.password.value||'').trim();if(!a||!u||!n)return showNotification('请完整填写节点信息','warning');if(id){await api('/api/qb/update',{method:'POST',body:JSON.stringify({id:Number(id),alias:a,url:u,username:n,password:p})});showNotification('节点修改成功','success')}else{if(!p)return showNotification('新增节点时密码不能为空','warning');await api('/api/qbservers',{method:'POST',body:JSON.stringify({name:a,url:u,username:n,password:p})});showNotification('节点添加成功','success')}resetQbForm();await loadServers()});document.getElementById('btnTestQb').onclick=async()=>{const f=document.getElementById('qbForm');try{const d=await api('/api/qb/test',{method:'POST',body:JSON.stringify({url:f.url.value,username:f.username.value,password:f.password.value})});showNotification(d.message||'连接成功','success')}catch(e){showNotification(e.message,'danger')}};document.getElementById('tgForm').addEventListener('submit',async e=>{e.preventDefault();const f=e.target;await api('/api/settings/telegram',{method:'POST',body:JSON.stringify({tg_token:f.tg_token.value,tg_chat_id:f.tg_chat_id.value,tg_proxy:f.tg_proxy.value})});showNotification('Telegram 设置已保存并发送测试消息','success')});document.getElementById('btnClearTg').onclick=async()=>{const ok=await ask('确认清空 Telegram 配置？','清空 Telegram',true);if(!ok)return;await api('/api/settings/telegram',{method:'DELETE'});await loadTgSettings();showNotification('Telegram 配置已清空','success')};document.getElementById('systemForm').addEventListener('submit',async e=>{e.preventDefault();const f=e.target,p1=(f.auth_password.value||'').trim(),p2=(f.auth_password_confirm.value||'').trim();if((p1||p2)&&p1!==p2)return showNotification('两次密码输入不一致','warning');await api('/api/settings/system',{method:'POST',body:JSON.stringify({auth_username:f.auth_username.value,auth_password:p1,auth_password_confirm:p2,upload_cron:f.upload_cron.value,clouddrive_path:f.clouddrive_path.value,delete_after_upload:!!f.delete_after_upload.checked,notify_pack_start:!!f.notify_pack_start.checked,notify_pack_end:!!f.notify_pack_end.checked,notify_upload_start:!!f.notify_upload_start.checked,notify_upload_end:!!f.notify_upload_end.checked})});f.auth_password.value='';f.auth_password_confirm.value='';showNotification('系统设置已保存','success')});document.getElementById('btnRefreshAll').onclick=refreshAll;document.getElementById('btnRefreshHistory').onclick=()=>fetchHistory(false);document.getElementById('btnBatchDelete').onclick=batchDeleteHistory;document.getElementById('historyCheckAll').onchange=e=>document.querySelectorAll('.history-checkbox').forEach(x=>x.checked=e.target.checked);document.getElementById('pageSizeSelect').onchange=e=>{pageSize=e.target.value==='all'?'all':Number(e.target.value);currentPage=1;renderHistory()};document.getElementById('btnPrevPage').onclick=()=>{if(currentPage>1){currentPage--;renderHistory()}};document.getElementById('btnNextPage').onclick=()=>{const t=pageSize==='all'?1:Math.max(1,Math.ceil(allHistoryData.length/(pageSize||50)));if(currentPage<t){currentPage++;renderHistory()}};document.getElementById('btnViewLogs').onclick=async()=>{try{await loadLogs();logModal.show()}catch(e){showNotification(e.message,'danger')}};document.querySelectorAll('#sideNav .nav-link').forEach(l=>l.addEventListener('click',async()=>{const id=l.dataset.view;document.querySelectorAll('#sideNav .nav-link').forEach(x=>x.classList.remove('active'));l.classList.add('active');document.querySelectorAll('.app-view').forEach(v=>v.classList.add('d-none'));document.getElementById(id).classList.remove('d-none');if(id==='viewHistory')await fetchHistory(false)}));initResize();refreshAll();setInterval(async()=>{try{await Promise.all([loadStats(),loadProgress(),loadPending(),loadPendingUploads(),fetchHistory(true)])}catch(_){ }},5000);
</script></body></html>
