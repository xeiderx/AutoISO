<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoISO {{ version }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --sidebar-w: 240px; }
    body { background: #f4f7fb; }
    .sidebar { position: fixed; left: 0; top: 0; width: var(--sidebar-w); height: 100vh; background: linear-gradient(180deg,#0f172a,#111827); color: #fff; padding: 18px 14px; z-index: 1000; }
    .main { margin-left: var(--sidebar-w); padding: 18px; }
    .nav-pills .nav-link { color: #cbd5e1; text-align: left; cursor: pointer; }
    .nav-pills .nav-link.active, .nav-pills .nav-link:hover { color: #fff; background: rgba(255,255,255,.12); }
    .card { border: 0; border-radius: 14px; box-shadow: 0 8px 24px rgba(15,23,42,.06); }
    .stats-line-wrap { overflow-x: auto; padding-bottom: 4px; }
    .stats-line { display: grid; grid-template-columns: 80px 0.8fr 1.2fr 1fr 1fr 0.8fr 1.2fr; gap: 12px; min-width: 980px; }
    .stats-head { border-radius: 12px; background: #dbe3ef; color: #334155; font-size: 1.05rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .stats-card { border-radius: 12px; background: #fff; box-shadow: 0 8px 24px rgba(15,23,42,.06); padding: 12px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .stat-title { color: #64748b; font-size: .84rem; }
    .stat-value { font-size: 1.08rem; font-weight: 700; color: #0f172a; }
    .resizable-table { table-layout: fixed; width: 100%; }
    .table-responsive { overflow-x: hidden; }
    .table-fixed th, .table-fixed td { white-space: normal; word-break: break-all; overflow-wrap: anywhere; vertical-align: middle; }
    .time-col { white-space: nowrap !important; word-break: normal !important; }
    .time-cell span { white-space: nowrap !important; word-break: normal !important; }
    .status-console { background: #05080f; color: #d1fae5; border: 1px solid #1f2937; border-radius: 10px; min-height: 380px; max-height: 65vh; overflow: auto; padding: 12px; white-space: pre-wrap; font-family: Consolas, Menlo, Monaco, monospace; font-size: .88rem; line-height: 1.4; }
    .ellipsis-cell { max-width: 260px; }
    .nav-tabs { border-bottom: 1px solid #e5e7eb; }
    .nav-tabs .nav-link { color: #6c757d; border: none; background: transparent; border-bottom: 2px solid transparent; }
    .nav-tabs .nav-link:hover { color: #495057; border-color: transparent; }
    .nav-tabs .nav-link.active { color: #0d6efd; font-weight: 700; border: none; border-bottom: 2px solid #0d6efd; background: transparent; }
    #confirmModal { z-index: 2000 !important; }
    .modal-backdrop.confirm-backdrop { z-index: 1990 !important; }
    .toast-container-custom { position: fixed; top: 20px; right: 20px; z-index: 2200; padding-top: 8px; }
    .toast-success { background-color: rgba(25, 135, 84, 0.85) !important; color: #fff !important; border: 0 !important; }
    @media (max-width: 992px) { .sidebar { position: static; width: 100%; height: auto; } .main { margin-left: 0; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="fw-bold mb-2">AutoISO {{ version }}</div>
    <div class="small text-secondary mb-2">NAS 原盘封装中控台</div>
    <ul class="nav nav-pills flex-column gap-1" id="sideNav">
      <li class="nav-item"><a class="nav-link active" data-view="viewDashboard"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a></li>
      <li class="nav-item"><a class="nav-link" data-view="viewSettings"><i class="bi bi-sliders me-2"></i>系统设置</a></li>
      <li class="nav-item"><a class="nav-link" data-view="viewHistory"><i class="bi bi-clock-history me-2"></i>历史记录</a></li>
    </ul>
    <a href="/logout" class="btn btn-outline-light btn-sm w-100 mt-3">退出登录</a>
  </aside>

  <main class="main">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 id="pageTitle" class="mb-0">仪表盘</h5>
      <div class="d-flex gap-2">
        <button id="btnViewLogs" class="btn btn-outline-dark btn-sm"><i class="bi bi-journal-text me-1"></i>系统日志</button>
        <button id="btnRefreshAll" class="btn btn-primary btn-sm"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button>
      </div>
    </div>

    <section id="viewDashboard" class="app-view">
      <div id="statsBoard"></div>
      <div class="row g-3 mt-1">
        <div class="col-lg-6">
          <div class="card h-100"><div class="card-body">
            <h6 class="mb-2">封装状态</h6>
            <div id="packingTasks" class="small text-muted">暂无封装任务</div>
          </div></div>
        </div>
        <div class="col-lg-6">
          <div class="card h-100"><div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="mb-0">上传状态</h6>
              <div class="d-flex gap-2">
                <button id="btnUploadPauseResume" class="btn btn-warning btn-sm d-none">暂停</button>
                <button id="btnUploadAbort" class="btn btn-danger btn-sm d-none">中止</button>
              </div>
            </div>
            <div id="uploadTaskStatus" class="small text-muted">暂无上传任务</div>
          </div></div>
        </div>
      </div>
      <div class="card mt-3"><div class="card-body">
        <h6 class="mb-3">待封装任务</h6>
        <div class="table-responsive">
          <table id="pendingTable" class="table table-sm table-hover table-fixed resizable-table align-middle">
            <colgroup><col style="width:5%"><col style="width:10%"><col style="width:50%"><col style="width:10%"><col style="width:25%"></colgroup>
            <thead><tr><th>序号</th><th>节点</th><th>文件名</th><th>大小(GB)</th><th>添加时间</th></tr></thead>
            <tbody id="pendingBody"></tbody>
          </table>
        </div>
      </div></div>
      <div class="card mt-3"><div class="card-body">
        <h6 class="mb-3">待上传任务</h6>
        <div class="table-responsive">
          <table id="pendingUploadsTable" class="table table-sm table-hover table-fixed resizable-table align-middle">
            <colgroup><col style="width:5%"><col style="width:8%"><col style="width:57%"><col style="width:8%"><col style="width:10%"><col style="width:12%"></colgroup>
            <thead><tr><th>序号</th><th>节点</th><th>文件名</th><th>大小(GB)</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="pendingUploadsBody"></tbody>
          </table>
        </div>
      </div></div>
    </section>

    <section id="viewSettings" class="app-view d-none">
      <div class="card"><div class="card-body">
        <ul class="nav nav-tabs" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabQb" type="button">qBittorrent 设置</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabUser" type="button">用户设置</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabUpload" type="button">上传设置</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabTelegram" type="button">Telegram 通知</button></li>
        </ul>
        <div class="tab-content pt-3">
          <div class="tab-pane fade show active" id="tabQb">
            <form id="qbForm" class="row g-3">
              <input type="hidden" name="qb_id">
              <div class="col-md-6"><label class="form-label">节点名称</label><input class="form-control" name="alias" required></div>
              <div class="col-md-6"><label class="form-label">节点 URL</label><input class="form-control" name="url" placeholder="http://127.0.0.1:8080" required></div>
              <div class="col-md-6"><label class="form-label">账号</label><input class="form-control" name="username" required></div>
              <div class="col-md-6"><label class="form-label">密码</label><input class="form-control" type="password" name="password" placeholder="留空表示不修改"></div>
              <div class="col-md-6"><label class="form-label">监控标签</label><input id="qb_monitor_tag" class="form-control" placeholder="待封装"></div>
              <div class="col-md-6 d-flex align-items-end gap-2"><button class="btn btn-primary" type="submit">保存</button><button class="btn btn-outline-info" type="button" id="btnTestQb">连接测试</button></div>
            </form>
            <hr>
            <div class="table-responsive">
              <table id="qbTable" class="table table-sm table-hover table-fixed resizable-table align-middle">
                <colgroup><col style="width:8%"><col style="width:16%"><col style="width:46%"><col style="width:12%"><col style="width:18%"></colgroup>
                <thead><tr><th>ID</th><th>节点</th><th>URL</th><th>账号</th><th>操作</th></tr></thead>
                <tbody id="qbList"></tbody>
              </table>
            </div>
          </div>
          <div class="tab-pane fade" id="tabUser">
            <form id="userForm" class="row g-3">
              <div class="col-md-6"><label class="form-label">系统登录用户名</label><input class="form-control" name="auth_username" required></div>
              <div class="col-md-6"></div>
              <div class="col-md-6"><label class="form-label">新密码</label><input class="form-control" type="password" name="auth_password" placeholder="留空则不修改"></div>
              <div class="col-md-6"><label class="form-label">确认新密码</label><input class="form-control" type="password" name="auth_password_confirm"></div>
              <div class="col-12"><button class="btn btn-success" type="submit">保存</button></div>
            </form>
          </div>
          <div class="tab-pane fade" id="tabUpload">
            <form id="uploadForm" class="row g-3">
              <div class="col-md-6"><label class="form-label">自动上传时间 (Cron)</label><input class="form-control" name="upload_cron" placeholder="0 2 * * *"></div>
              <div class="col-md-6"><label class="form-label">CloudDrive 挂载路径</label><input class="form-control" name="clouddrive_path" placeholder="/CloudNAS/CloudDrive/115open/文件夹名称（如Media/电影）"></div>
              <div class="col-12"><div class="form-check form-switch"><input class="form-check-input" id="delete_after_upload" type="checkbox" name="delete_after_upload"><label class="form-check-label" for="delete_after_upload">上传后彻底删除本地源文件</label></div></div>
              <div class="col-12"><button class="btn btn-success" type="submit">保存</button></div>
            </form>
          </div>
          <div class="tab-pane fade" id="tabTelegram">
            <form id="tgForm" class="row g-3">
              <div class="col-md-6"><label class="form-label">Bot Token</label><input class="form-control" name="tg_token" required></div>
              <div class="col-md-6"><label class="form-label">Chat ID</label><input class="form-control" name="tg_chat_id" required></div>
              <div class="col-12"><label class="form-label">代理</label><input class="form-control" name="tg_proxy" placeholder="http://127.0.0.1:7890"></div>
              <div class="col-md-3"><div class="form-check form-switch mt-2"><input class="form-check-input" id="notify_pack_start" type="checkbox"><label class="form-check-label" for="notify_pack_start">封装开始</label></div></div>
              <div class="col-md-3"><div class="form-check form-switch mt-2"><input class="form-check-input" id="notify_pack_end" type="checkbox"><label class="form-check-label" for="notify_pack_end">封装完成</label></div></div>
              <div class="col-md-3"><div class="form-check form-switch mt-2"><input class="form-check-input" id="notify_upload_start" type="checkbox"><label class="form-check-label" for="notify_upload_start">上传开始</label></div></div>
              <div class="col-md-3"><div class="form-check form-switch mt-2"><input class="form-check-input" id="notify_upload_end" type="checkbox"><label class="form-check-label" for="notify_upload_end">上传完成</label></div></div>
              <div class="col-12 d-flex gap-2"><button class="btn btn-success" type="submit">保存</button><button class="btn btn-outline-danger" type="button" id="btnClearTg">清空配置</button></div>
            </form>
          </div>
        </div>
      </div></div>
    </section>

    <section id="viewHistory" class="app-view d-none">
      <div class="card"><div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2"><h6 class="mb-0">历史记录</h6><button id="btnDeleteHistory" class="btn btn-outline-danger btn-sm">批量删除</button></div>
        <div class="table-responsive">
          <table id="historyTable" class="table table-sm table-hover table-fixed resizable-table align-middle">
            <colgroup><col style="width:5%"><col style="width:5%"><col style="width:30%"><col style="width:7%"><col style="width:8%"><col style="width:7%"><col style="width:7%"><col style="width:8%"><col style="width:8%"><col style="width:8%"><col style="width:8%"><col style="width:7%"></colgroup>
            <thead><tr><th><input type="checkbox" id="historyCheckAll"></th><th>ID</th><th>任务</th><th>节点</th><th>状态</th><th>大小(GB)</th><th>封装耗时</th><th class="time-col">封装开始</th><th class="time-col">封装结束</th><th class="time-col">上传开始</th><th class="time-col">上传结束</th><th>上传耗时</th></tr></thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div></div>
    </section>
  </main>

  <div class="toast-container-custom"><div id="toast" class="toast border-0"><div class="d-flex"><div id="toastBody" class="toast-body">提示</div><button class="btn-close btn-close-white m-auto me-2" data-bs-dismiss="toast"></button></div></div></div>
  <div class="modal fade" id="confirmModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 id="confirmTitle" class="modal-title">确认操作</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div id="confirmMessage" class="modal-body"></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button id="confirmOkBtn" class="btn btn-danger">确认</button></div></div></div></div>
  <div class="modal fade" id="logModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-scrollable"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">系统日志</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="d-flex gap-2 mb-2"><button id="btnExportLogs" class="btn btn-outline-success btn-sm">导出日志</button><button id="btnClearLogs" class="btn btn-outline-danger btn-sm">清空日志</button></div><pre id="logContent" class="status-console"></pre></div></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const toastEl = document.getElementById('toast');
    const toast = new bootstrap.Toast(toastEl);
    const confirmModalEl = document.getElementById('confirmModal');
    const confirmModal = new bootstrap.Modal(confirmModalEl);
    const logModal = new bootstrap.Modal(document.getElementById('logModal'));
    let askResolve = null;
    let currentUploadStatus = 'idle';
    let currentUploadingFile = '';
    const $ = (id) => document.getElementById(id);
    function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
    function notify(msg,type='primary'){toastEl.className='toast border-0';toastEl.style.backgroundColor='';toastEl.style.color='';if(type==='success'){toastEl.classList.add('toast-success');}else{const map={primary:'rgba(13,110,253,.90)',danger:'rgba(220,53,69,.90)',warning:'rgba(255,193,7,.92)'};toastEl.style.backgroundColor=map[type]||map.primary;toastEl.style.color='#fff';}$('toastBody').textContent=msg;toast.show();}
    function fmtSec(sec){if(sec===null||sec===undefined||Number.isNaN(Number(sec)))return '-';const n=Math.max(0,Number(sec));const h=Math.floor(n/3600),m=Math.floor((n%3600)/60),s=Math.floor(n%60);if(h>0)return `${h}h ${m}m ${s}s`;if(m>0)return `${m}m ${s}s`;return `${s}s`;}
    function fmtDt(raw){const txt=String(raw||'').trim();if(!txt)return '<span class="small text-muted">-</span>';const p=txt.split(' ');return `<div class="small text-secondary time-cell"><span class="d-inline-block">${esc(p[0]||'-')}</span><br><span class="d-inline-block">${esc(p[1]||'-')}</span></div>`;}
    function badge(s){s=String(s||'').trim();if(s==='已上传至网盘'||s==='uploaded')return '<span class="badge rounded-pill text-bg-success">已上传</span>';if(s==='上传中'||s==='uploading')return '<span class="badge rounded-pill text-bg-warning">上传中</span>';if(s==='封装完成，待上传'||s==='pending')return '<span class="badge rounded-pill text-bg-secondary">待上传</span>';if(s==='中止上传'||s==='aborted')return '<span class="badge rounded-pill text-bg-danger">已中止</span>';if(s==='本地已删除')return '<span class="badge rounded-pill text-bg-dark">本地已删除</span>';if(s==='Failed'||s==='failed')return '<span class="badge rounded-pill text-bg-danger">失败</span>';return `<span class="badge rounded-pill text-bg-info">${esc(s||'处理中')}</span>`;}
    async function ask(msg,title='确认操作'){ $('confirmTitle').textContent=title; $('confirmMessage').textContent=msg; return new Promise(r=>{askResolve=r;confirmModal.show();}); }
    $('confirmOkBtn').addEventListener('click',()=>{if(askResolve)askResolve(true);askResolve=null;confirmModal.hide();});
    confirmModalEl.addEventListener('hidden.bs.modal',()=>{if(askResolve)askResolve(false);askResolve=null;});
    async function api(url,opt={}){const init={method:opt.method||'GET',headers:{'Content-Type':'application/json'}};if(opt.body!==undefined)init.body=opt.body;const r=await fetch(url,init);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||`HTTP ${r.status}`);return d;}
    function statsRow(title,iconClass,data){const cards=[['总次数',data.total_count||0],['总数据',data.total_size_text||'-'],['平均耗时',data.avg_duration_text||'-'],['平均速率',data.avg_rate_text||'-'],['本月次数',data.month_count||0],['本月数据',data.month_size_text||'-']];return `<div class="stats-line-wrap mb-2"><div class="stats-line"><div class="stats-head"><i class="bi ${iconClass} fs-3 text-secondary me-2"></i><span>${title}</span></div>${cards.map(c=>`<div class="stats-card"><div class="stat-title">${c[0]}</div><div class="stat-value">${esc(c[1])}</div></div>`).join('')}</div></div>`;}
    async function loadStatsAndProgress(){const stats=await api('/api/stats');currentUploadingFile=String(stats.current_uploading_file||'');$('statsBoard').innerHTML=`${statsRow('封装','bi-box-seam',stats.pack||{})}${statsRow('上传','bi-cloud-upload',stats.upload||{})}`;const p=await api('/api/progress');if(!p.active||!(p.tasks||[]).length){$('packingTasks').innerHTML='<div class="text-muted">暂无封装任务</div>';}else{$('packingTasks').innerHTML=p.tasks.map(t=>`<div class="border rounded p-2 mb-2"><div class="fw-semibold mb-1">${esc(t.task_name)} <span class="text-secondary">(${esc(t.server_name)})</span></div><div class="progress mb-2" style="height:10px;"><div class="progress-bar" style="width:${Number(t.progress||0).toFixed(2)}%"></div></div><div class="small text-secondary">Speed: ${Number(t.speed_mbps||0).toFixed(2)} MB/s | ETA: ${esc(t.eta_text||'-')} | 进度: ${Number(t.progress||0).toFixed(2)}%</div></div>`).join('');}
      const up=stats.upload_progress||{};const cs=stats.current_upload_status||{};currentUploadStatus=String(cs.status||'idle');const active=Boolean(up.active||cs.active);if(!active){$('uploadTaskStatus').innerHTML='<div class="text-muted">暂无上传任务</div>';$('btnUploadPauseResume').classList.add('d-none');$('btnUploadAbort').classList.add('d-none');return;}const f=up.file_name||cs.file_name||'';const pct=Number(up.percentage||0);const paused=currentUploadStatus==='paused';$('uploadTaskStatus').innerHTML=`<div class="fw-semibold mb-1">${esc(f)}</div><div class="progress mb-2" style="height:10px;"><div class="progress-bar ${paused?'bg-warning':'bg-success'}" style="width:${pct.toFixed(2)}%"></div></div><div class="small text-secondary">Speed: ${Number(up.speed_mbps||0).toFixed(2)} MB/s | ETA: ${esc(up.eta||'-')} | 进度: ${pct.toFixed(2)}%</div>`;$('btnUploadPauseResume').classList.remove('d-none');$('btnUploadAbort').classList.remove('d-none');$('btnUploadPauseResume').textContent=paused?'继续':'暂停';$('btnUploadPauseResume').className=`btn btn-sm ${paused?'btn-success':'btn-warning'}`;}
    async function loadPending(){const rows=await api('/api/pending');$('pendingBody').innerHTML=rows.length?rows.map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x.node_alias||'-')}</td><td class="ellipsis-cell" title="${esc(x.title||'')}">${esc(x.title||'')}</td><td>${Number(x.size_gb||0).toFixed(3)}</td><td>${esc(x.added_on||'-')}</td></tr>`).join(''):'<tr><td colspan="5" class="text-center text-muted">暂无数据</td></tr>'}
    async function loadPendingUploads(){const rows=await api('/api/pending_uploads');$('pendingUploadsBody').innerHTML=rows.length?rows.map((x,i)=>{const up=String(x.status||'').toLowerCase()==='uploaded';const uploadingNow=String(x.filename||'')===currentUploadingFile;const disabled=uploadingNow?'disabled':'';return `<tr><td>${i+1}</td><td>${esc(x.node||'NAS')}</td><td class="ellipsis-cell" title="${esc(x.filename||'')}">${esc(x.filename||'')}</td><td>${Number(x.size_gb||x.size||0).toFixed(3)}</td><td>${up?'<span class="badge text-bg-success">已上传</span>':'<span class="badge text-bg-secondary">待上传</span>'}</td><td><button class="btn btn-sm ${up?'btn-warning':'btn-primary'} me-1" data-act="upload" data-name="${esc(x.filename)}" ${disabled}>${up?'重新上传':'立即上传'}</button><button class="btn btn-sm btn-danger" data-act="delete" data-name="${esc(x.filename)}" ${disabled}>删除本地</button></td></tr>`}).join(''):'<tr><td colspan="6" class="text-center text-muted">暂无可上传文件</td></tr>';}
    async function loadHistory(){const rows=await api('/api/history?limit=0');$('historyBody').innerHTML=(rows||[]).length?rows.map(x=>`<tr><td><input type="checkbox" class="history-check" value="${x.id}"></td><td>${x.id}</td><td class="ellipsis-cell" title="${esc(x.task_name||'')}">${esc(x.task_name||'')}</td><td>${esc(x.qb_server_name||'-')}</td><td>${badge(x.status)}</td><td>${Number(x.file_size_gb||0).toFixed(2)}</td><td>${fmtSec(x.duration_seconds)}</td><td class="time-col">${fmtDt(x.start_time)}</td><td class="time-col">${fmtDt(x.end_time)}</td><td class="time-col">${fmtDt(x.upload_start_time)}</td><td class="time-col">${fmtDt(x.upload_end_time)}</td><td>${fmtSec(x.upload_duration_seconds)}</td></tr>`).join(''):'<tr><td colspan="12" class="text-center text-muted">暂无历史记录</td></tr>';}
    async function loadQbServers(){const rows=await api('/api/qbservers');$('qbList').innerHTML=rows.length?rows.map(x=>`<tr><td>${x.id}</td><td>${esc(x.name)}</td><td class="ellipsis-cell" title="${esc(x.url)}">${esc(x.url)}</td><td>${esc(x.username||'')}</td><td><button class="btn btn-outline-primary btn-sm me-1" data-act="edit" data-id="${x.id}" data-name="${esc(x.name)}" data-url="${esc(x.url)}" data-username="${esc(x.username||'')}">编辑</button><button class="btn btn-outline-danger btn-sm" data-act="delete" data-id="${x.id}">删除</button></td></tr>`).join(''):'<tr><td colspan="5" class="text-center text-muted">暂无节点</td></tr>';}
    async function loadSettings(){const [sys,tg]=await Promise.all([api('/api/settings/system'),api('/api/settings/telegram')]);userForm.auth_username.value=sys.auth_username||'';uploadForm.upload_cron.value=sys.upload_cron||'';uploadForm.clouddrive_path.value=sys.clouddrive_path||'';uploadForm.delete_after_upload.checked=!!sys.delete_after_upload;qb_monitor_tag.value=sys.qb_monitor_tag||'待封装';notify_pack_start.checked=!!sys.notify_pack_start;notify_pack_end.checked=!!sys.notify_pack_end;notify_upload_start.checked=!!sys.notify_upload_start;notify_upload_end.checked=!!sys.notify_upload_end;tgForm.tg_token.value=tg.tg_token||'';tgForm.tg_chat_id.value=tg.tg_chat_id||'';tgForm.tg_proxy.value=tg.tg_proxy||'';await loadQbServers();}
    async function saveSystem(){const p1=(userForm.auth_password.value||'').trim(),p2=(userForm.auth_password_confirm.value||'').trim();if((p1||p2)&&p1!==p2)throw new Error('两次密码输入不一致');await api('/api/settings/system',{method:'POST',body:JSON.stringify({auth_username:userForm.auth_username.value,auth_password:p1,auth_password_confirm:p2,upload_cron:uploadForm.upload_cron.value,clouddrive_path:uploadForm.clouddrive_path.value,qb_monitor_tag:qb_monitor_tag.value,delete_after_upload:!!uploadForm.delete_after_upload.checked,notify_pack_start:!!notify_pack_start.checked,notify_pack_end:!!notify_pack_end.checked,notify_upload_start:!!notify_upload_start.checked,notify_upload_end:!!notify_upload_end.checked})});userForm.auth_password.value='';userForm.auth_password_confirm.value='';}
    async function loadLogs(){const d=await api('/api/logs');const logs=Array.isArray(d.logs)?d.logs:[];$('logContent').textContent=logs.length?logs.join('\n\n'):(d.message||'暂无日志');}
    sideNav.querySelectorAll('.nav-link').forEach(link=>{link.addEventListener('click',async()=>{sideNav.querySelectorAll('.nav-link').forEach(x=>x.classList.remove('active'));link.classList.add('active');document.querySelectorAll('.app-view').forEach(v=>v.classList.add('d-none'));const vid=link.dataset.view;$(vid).classList.remove('d-none');$('pageTitle').textContent=vid==='viewDashboard'?'仪表盘':(vid==='viewSettings'?'系统设置':'历史记录');if(vid==='viewSettings')await loadSettings();if(vid==='viewHistory')await loadHistory();});});
    $('btnRefreshAll').addEventListener('click',async()=>{try{await loadStatsAndProgress();await Promise.all([loadPending(),loadPendingUploads()]);if(!$('viewSettings').classList.contains('d-none'))await loadSettings();if(!$('viewHistory').classList.contains('d-none'))await loadHistory();notify('刷新完成','success');}catch(e){notify(e.message,'danger');}});
    $('btnUploadPauseResume').addEventListener('click',async()=>{try{const action=currentUploadStatus==='paused'?'resume':'pause';await api('/api/upload/control',{method:'POST',body:JSON.stringify({action})});notify(action==='pause'?'上传已暂停':'上传已继续','success');await loadStatsAndProgress();}catch(e){notify(e.message,'danger');}});
    $('btnUploadAbort').addEventListener('click',async()=>{if(!await ask('危险操作：确定要中止当前上传吗？','中止上传'))return;try{await api('/api/upload/control',{method:'POST',body:JSON.stringify({action:'abort'})});notify('上传中止指令已发送','warning');await loadStatsAndProgress();}catch(e){notify(e.message,'danger');}});
    pendingUploadsBody.addEventListener('click',async(e)=>{const btn=e.target.closest('button[data-act]');if(!btn)return;const act=btn.dataset.act,name=btn.dataset.name;if(!name)return;if(act==='upload'){try{await api(`/api/upload_now/${encodeURIComponent(name)}`,{method:'POST'});notify(`已开始上传：${name}`,'success');await loadStatsAndProgress();await loadPendingUploads();}catch(err){notify(err.message,'danger');}return;}if(act==='delete'){if(!await ask('危险操作：确定要彻底删除本地的源文件吗？此操作不可逆！','删除本地文件'))return;try{await api(`/api/delete_local/${encodeURIComponent(name)}`,{method:'POST'});notify(`已删除本地文件：${name}`,'success');await loadPendingUploads();await loadHistory();}catch(err){notify(err.message,'danger');}}});
    qbForm.addEventListener('submit',async(e)=>{e.preventDefault();try{const id=(qbForm.qb_id.value||'').trim();if(id){await api('/api/qb/update',{method:'POST',body:JSON.stringify({id:Number(id),alias:qbForm.alias.value,url:qbForm.url.value,username:qbForm.username.value,password:qbForm.password.value})});}else{await api('/api/qbservers',{method:'POST',body:JSON.stringify({name:qbForm.alias.value,url:qbForm.url.value,username:qbForm.username.value,password:qbForm.password.value})});}await saveSystem();qbForm.reset();qbForm.qb_id.value='';notify('保存成功','success');await loadQbServers();}catch(err){notify(err.message,'danger');}});
    qbList.addEventListener('click',async(e)=>{const btn=e.target.closest('button[data-act]');if(!btn)return;const act=btn.dataset.act;if(act==='edit'){qbForm.qb_id.value=btn.dataset.id||'';qbForm.alias.value=btn.dataset.name||'';qbForm.url.value=btn.dataset.url||'';qbForm.username.value=btn.dataset.username||'';qbForm.password.value='';return;}if(act==='delete'){const id=Number(btn.dataset.id||0);if(!id)return;if(!await ask('确定删除该 qB 节点吗？','删除节点'))return;try{await api(`/api/qbservers/${id}`,{method:'DELETE'});notify('节点已删除','success');await loadQbServers();}catch(err){notify(err.message,'danger');}}});
    $('btnTestQb').addEventListener('click',async()=>{try{const d=await api('/api/qb/test',{method:'POST',body:JSON.stringify({url:qbForm.url.value,username:qbForm.username.value,password:qbForm.password.value})});notify(d.message||'连接成功','success');}catch(err){notify(err.message,'danger');}});
    userForm.addEventListener('submit',async(e)=>{e.preventDefault();try{await saveSystem();notify('保存成功','success');}catch(err){notify(err.message,'danger');}});
    uploadForm.addEventListener('submit',async(e)=>{e.preventDefault();try{await saveSystem();notify('保存成功','success');}catch(err){notify(err.message,'danger');}});
    tgForm.addEventListener('submit',async(e)=>{e.preventDefault();try{await api('/api/settings/telegram',{method:'POST',body:JSON.stringify({tg_token:tgForm.tg_token.value,tg_chat_id:tgForm.tg_chat_id.value,tg_proxy:tgForm.tg_proxy.value})});await saveSystem();notify('保存成功','success');}catch(err){notify(err.message,'danger');}});
    $('btnClearTg').addEventListener('click',async()=>{if(!await ask('确定清空 Telegram 配置吗？','清空 Telegram 配置'))return;try{await api('/api/settings/telegram',{method:'DELETE'});await loadSettings();notify('Telegram 配置已清空','success');}catch(err){notify(err.message,'danger');}});
    $('historyCheckAll').addEventListener('change',(e)=>{document.querySelectorAll('.history-check').forEach(c=>{c.checked=e.target.checked;});});
    $('btnDeleteHistory').addEventListener('click',async()=>{const ids=Array.from(document.querySelectorAll('.history-check:checked')).map(x=>Number(x.value));if(!ids.length){notify('请先选择要删除的记录','warning');return;}if(!await ask(`确定删除已选中的 ${ids.length} 条历史记录吗？`,'批量删除历史记录'))return;try{await api('/api/history/delete',{method:'POST',body:JSON.stringify({ids})});notify('历史记录已删除','success');await loadHistory();}catch(err){notify(err.message,'danger');}});
    $('btnViewLogs').addEventListener('click',async()=>{try{await loadLogs();logModal.show();}catch(e){notify(e.message,'danger');}});
    $('btnExportLogs').addEventListener('click',()=>window.open('/api/logs/export','_blank'));
    $('btnClearLogs').addEventListener('click',async()=>{if(!await ask('确定清空日志文件吗？','清空日志'))return;try{await api('/api/logs/clear',{method:'POST'});await loadLogs();notify('日志已清空','success');}catch(err){notify(err.message,'danger');}});
    confirmModalEl.addEventListener('shown.bs.modal',()=>{setTimeout(()=>{const b=document.querySelectorAll('.modal-backdrop');if(b.length)b[b.length-1].classList.add('confirm-backdrop');},0);});
    async function boot(){try{await loadStatsAndProgress();await Promise.all([loadPending(),loadPendingUploads(),loadSettings(),loadHistory()]);}catch(e){notify(e.message,'danger');}setInterval(async()=>{if(!$('viewDashboard').classList.contains('d-none')){try{await loadStatsAndProgress();await loadPendingUploads();}catch(_e){}}},5000);}
    boot();
  </script>
</body>
</html>
