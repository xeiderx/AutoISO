<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoISO V2 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --sidebar-w: 250px;
      --bg: #f3f6fb;
      --card-shadow: 0 8px 30px rgba(17, 24, 39, .08);
    }
    body {
      background: var(--bg);
      color: #111827;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: linear-gradient(180deg, #0b1220, #111a2f);
      color: #e5e7eb;
      padding: 22px 16px;
      box-shadow: 6px 0 20px rgba(0,0,0,.12);
      z-index: 1000;
      overflow-y: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 18px;
      letter-spacing: .3px;
    }
    .brand i {
      background: linear-gradient(135deg, #0d6efd, #00d4ff);
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .nav-link {
      border-radius: 10px;
      color: #cbd5e1;
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(255, 255, 255, .09);
      color: #fff;
    }
    .main {
      margin-left: var(--sidebar-w);
      padding: 24px;
    }
    .topbar {
      background: #fff;
      border-radius: 14px;
      box-shadow: var(--card-shadow);
      padding: 14px 18px;
      margin-bottom: 18px;
    }
    .card.soft {
      border: 0;
      border-radius: 14px;
      box-shadow: var(--card-shadow);
    }
    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .table-wrap {
      max-height: 68vh;
      overflow: auto;
    }
    @media (max-width: 992px) {
      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        border-radius: 0 0 14px 14px;
      }
      .main {
        margin-left: 0;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><i class="bi bi-collection-play"></i> AutoISO V2</div>
    <div class="small text-secondary mb-3">原盘封装中控台</div>
    <nav class="nav flex-column" id="sideNav">
      <a class="nav-link active" data-view="viewDashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
      <a class="nav-link" data-view="viewSettings"><i class="bi bi-sliders me-2"></i> 设置管理</a>
      <a class="nav-link" data-view="viewHistory"><i class="bi bi-clock-history me-2"></i> 历史记录</a>
    </nav>
    <hr class="border-secondary">
    <a href="/logout" class="btn btn-outline-light w-100"><i class="bi bi-box-arrow-right me-1"></i> 退出登录</a>
  </aside>

  <main class="main">
    <div class="topbar d-flex justify-content-between align-items-center">
      <div>
        <div class="fw-bold">AutoISO V2 Dashboard</div>
        <div class="text-muted small">系统每 60 秒自动轮询 qBittorrent 待封装任务</div>
      </div>
      <button class="btn btn-sm btn-outline-primary" id="btnRefreshAll"><i class="bi bi-arrow-clockwise me-1"></i> 刷新</button>
    </div>

    <section id="viewDashboard" class="app-view">
      <div class="row g-3 mb-3" id="statsCards">
        <div class="col-md-6 col-xl-3">
          <div class="card soft h-100"><div class="card-body">加载中...</div></div>
        </div>
      </div>

      <div class="card soft">
        <div class="card-body">
          <h5 class="card-title mb-3"><i class="bi bi-activity me-2"></i>正在执行</h5>
          <div id="activeTasks"></div>
        </div>
      </div>
    </section>

    <section id="viewSettings" class="app-view d-none">
      <div class="row g-3 mb-3">
        <div class="col-xl-6">
          <div class="card soft h-100">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-hdd-network me-2"></i>qBittorrent 管理</h5>
              <form id="qbForm" class="row g-2 mb-3">
                <div class="col-md-6"><input class="form-control" name="name" placeholder="节点别名" required></div>
                <div class="col-md-6"><input class="form-control" name="url" placeholder="http://qb-host:8080" required></div>
                <div class="col-md-6"><input class="form-control" name="username" placeholder="账号" required></div>
                <div class="col-md-6"><input class="form-control" name="password" type="password" placeholder="密码" required></div>
                <div class="col-md-6 d-grid"><button class="btn btn-primary" type="submit"><i class="bi bi-plus-circle me-1"></i>添加节点</button></div>
                <div class="col-md-6 d-grid"><button class="btn btn-outline-info" type="button" id="btnTestQb"><i class="bi bi-plug me-1"></i>测试连接</button></div>
              </form>
              <div id="qbList"></div>
            </div>
          </div>
        </div>

        <div class="col-xl-6">
          <div class="card soft h-100">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-telegram me-2"></i>Telegram 通知</h5>
              <form id="tgForm" class="row g-2 mb-3">
                <div class="col-12"><input class="form-control mono" name="tg_token" placeholder="Bot Token" required></div>
                <div class="col-12"><input class="form-control mono" name="tg_chat_id" placeholder="Chat ID" required></div>
                <div class="col-md-6 d-grid"><button class="btn btn-success" type="submit"><i class="bi bi-floppy me-1"></i>保存并测试</button></div>
                <div class="col-md-6 d-grid"><button class="btn btn-outline-danger" type="button" id="btnClearTg"><i class="bi bi-trash me-1"></i>清空设置</button></div>
              </form>
              <div class="small text-muted">保存后将发送测试消息到你的 Chat。</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-xl-6">
          <div class="card soft">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-shield-lock me-2"></i>安全设置</h5>
              <form id="authForm" class="row g-2">
                <div class="col-12">
                  <input class="form-control" name="auth_username" placeholder="新用户名" required>
                </div>
                <div class="col-12">
                  <input class="form-control" name="auth_password" type="password" placeholder="新密码" required>
                </div>
                <div class="col-12 d-grid">
                  <button class="btn btn-warning" type="submit"><i class="bi bi-key me-1"></i>保存账号密码</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="viewHistory" class="app-view d-none">
      <div class="card soft">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="card-title mb-0"><i class="bi bi-table me-2"></i>封装历史</h5>
            <button class="btn btn-sm btn-outline-secondary" id="btnRefreshHistory"><i class="bi bi-arrow-repeat me-1"></i>刷新历史</button>
          </div>
          <div class="table-wrap">
            <table class="table table-hover align-middle table-sm">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>任务名</th>
                  <th>节点</th>
                  <th>状态</th>
                  <th>大小(GB)</th>
                  <th>耗时</th>
                  <th>开始时间</th>
                  <th>结束时间</th>
                  <th>信息</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

<script>
  async function api(url, options = {}) {
    const response = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    const data = await response.json().catch(() => ({}));
    if (response.status === 401) {
      window.location.href = '/login';
      throw new Error('登录已过期');
    }
    if (!response.ok) {
      throw new Error(data.error || '请求失败');
    }
    return data;
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    })[ch]);
  }

  function formatSeconds(sec) {
    if (sec === null || sec === undefined) return '-';
    const total = Math.max(0, Number(sec));
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = Math.floor(total % 60);
    if (h > 0) return `${h}h ${m}m ${s}s`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function statusBadge(status) {
    if (status === 'Success') return '<span class="badge text-bg-success">Success</span>';
    if (status === 'Failed') return '<span class="badge text-bg-danger">Failed</span>';
    return '<span class="badge text-bg-warning">Processing</span>';
  }

  function switchView(viewId) {
    document.querySelectorAll('.app-view').forEach(view => view.classList.add('d-none'));
    const target = document.getElementById(viewId);
    if (target) target.classList.remove('d-none');
  }

  async function loadStats() {
    const stats = await api('/api/stats');
    const html = `
      <div class="col-md-6 col-xl-3">
        <div class="card soft h-100">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div><div class="text-muted small">总封装次数</div><div class="fs-3 fw-bold">${stats.total_count}</div></div>
            <span class="stat-icon" style="background:#0d6efd"><i class="bi bi-stack"></i></span>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-xl-3">
        <div class="card soft h-100">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div><div class="text-muted small">成功率</div><div class="fs-3 fw-bold">${stats.success_rate}%</div></div>
            <span class="stat-icon" style="background:#198754"><i class="bi bi-check2-circle"></i></span>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-xl-3">
        <div class="card soft h-100">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div><div class="text-muted small">累计处理数据</div><div class="fs-4 fw-bold">${escapeHtml(stats.total_size_text)}</div></div>
            <span class="stat-icon" style="background:#6f42c1"><i class="bi bi-database-fill"></i></span>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-xl-3">
        <div class="card soft h-100">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div><div class="text-muted small">平均耗时</div><div class="fs-4 fw-bold">${escapeHtml(stats.avg_duration_text)}</div></div>
            <span class="stat-icon" style="background:#fd7e14"><i class="bi bi-hourglass-split"></i></span>
          </div>
        </div>
      </div>
    `;
    document.getElementById('statsCards').innerHTML = html;
  }

  async function loadProgress() {
    const data = await api('/api/progress');
    const box = document.getElementById('activeTasks');

    if (!data.active || !data.tasks.length) {
      box.innerHTML = '<div class="text-muted">当前无任务</div>';
      return;
    }

    box.innerHTML = data.tasks.map(task => `
      <div class="border rounded p-3 mb-2 bg-light-subtle">
        <div class="d-flex justify-content-between mb-2">
          <div>
            <div class="fw-semibold">${escapeHtml(task.task_name)}</div>
            <div class="small text-muted">节点: ${escapeHtml(task.server_name)} | 已运行 ${formatSeconds(task.elapsed_seconds)}</div>
          </div>
          <div class="small mono">${task.progress}%</div>
        </div>
        <div class="progress" role="progressbar" aria-valuenow="${task.progress}" aria-valuemin="0" aria-valuemax="100" style="height: 12px;">
          <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:${task.progress}%"></div>
        </div>
        <div class="small text-muted mt-2">源: ${escapeHtml(task.source_path)}<br>目标: ${escapeHtml(task.iso_path)}</div>
      </div>
    `).join('');
  }

  async function loadServers() {
    const rows = await api('/api/qbservers');
    const el = document.getElementById('qbList');
    if (!rows.length) {
      el.innerHTML = '<div class="text-muted">暂无节点</div>';
      return;
    }

    el.innerHTML = rows.map(row => `
      <div class="border rounded p-2 mb-2 bg-white d-flex justify-content-between align-items-start">
        <div>
          <div class="fw-semibold">${escapeHtml(row.name)}</div>
          <div class="small text-muted mono">${escapeHtml(row.url)}</div>
          <div class="small text-muted">账号: ${escapeHtml(row.username)}</div>
        </div>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteServer(${row.id})"><i class="bi bi-trash"></i></button>
      </div>
    `).join('');
  }

  async function deleteServer(id) {
    if (!confirm('确认删除该 qB 节点?')) return;
    await api(`/api/qbservers/${id}`, { method: 'DELETE' });
    await loadServers();
  }

  async function loadTgSettings() {
    const data = await api('/api/settings/telegram');
    const form = document.getElementById('tgForm');
    form.tg_token.value = data.tg_token || '';
    form.tg_chat_id.value = data.tg_chat_id || '';
  }

  async function loadAuthSettings() {
    const data = await api('/api/settings/auth');
    const form = document.getElementById('authForm');
    form.auth_username.value = data.auth_username || '';
    form.auth_password.value = '';
  }

  async function loadHistory() {
    const list = await api('/api/history?limit=100');
    const tbody = document.getElementById('historyBody');

    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">暂无历史记录</td></tr>';
      return;
    }

    tbody.innerHTML = list.map(row => `
      <tr>
        <td>${row.id}</td>
        <td>${escapeHtml(row.task_name)}</td>
        <td>${escapeHtml(row.qb_server_name || '')}</td>
        <td>${statusBadge(row.status)}</td>
        <td>${Number(row.file_size_gb || 0).toFixed(2)}</td>
        <td>${formatSeconds(row.duration_seconds)}</td>
        <td>${escapeHtml(row.start_time || '-')}</td>
        <td>${escapeHtml(row.end_time || '-')}</td>
        <td title="${escapeHtml(row.message || '')}">${escapeHtml((row.message || '').slice(0, 60))}</td>
      </tr>
    `).join('');
  }

  async function refreshAll() {
    try {
      await Promise.all([
        loadStats(),
        loadProgress(),
        loadServers(),
        loadTgSettings(),
        loadAuthSettings(),
        loadHistory(),
      ]);
    } catch (err) {
      alert(err.message);
    }
  }

  document.getElementById('qbForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const form = event.target;
    await api('/api/qbservers', {
      method: 'POST',
      body: JSON.stringify({
        name: form.name.value,
        url: form.url.value,
        username: form.username.value,
        password: form.password.value,
      }),
    });
    form.reset();
    await loadServers();
    alert('节点添加成功');
  });

  document.getElementById('btnTestQb').addEventListener('click', async () => {
    const form = document.getElementById('qbForm');
    try {
      const data = await api('/api/qb/test', {
        method: 'POST',
        body: JSON.stringify({
          url: form.url.value,
          username: form.username.value,
          password: form.password.value,
        }),
      });
      alert(data.message || '连接成功');
    } catch (err) {
      alert(err.message);
    }
  });

  document.getElementById('tgForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const form = event.target;
    await api('/api/settings/telegram', {
      method: 'POST',
      body: JSON.stringify({
        tg_token: form.tg_token.value,
        tg_chat_id: form.tg_chat_id.value,
      }),
    });
    alert('Telegram 设置已保存并发送测试消息');
  });

  document.getElementById('btnClearTg').addEventListener('click', async () => {
    if (!confirm('确认清空 Telegram 配置?')) return;
    await api('/api/settings/telegram', { method: 'DELETE' });
    await loadTgSettings();
  });

  document.getElementById('authForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const form = event.target;
    await api('/api/settings/auth', {
      method: 'POST',
      body: JSON.stringify({
        auth_username: form.auth_username.value,
        auth_password: form.auth_password.value,
      }),
    });
    form.auth_password.value = '';
    alert('账号密码已更新');
  });

  document.getElementById('btnRefreshHistory').addEventListener('click', loadHistory);
  document.getElementById('btnRefreshAll').addEventListener('click', refreshAll);

  document.querySelectorAll('#sideNav .nav-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('#sideNav .nav-link').forEach(x => x.classList.remove('active'));
      link.classList.add('active');
      switchView(link.dataset.view);
    });
  });

  refreshAll();
  setInterval(loadProgress, 3000);
  setInterval(loadStats, 10000);
  setInterval(loadHistory, 10000);
</script>
</body>
</html>
