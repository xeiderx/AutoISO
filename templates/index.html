
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoISO {{ version }} Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --sidebar-w: 250px;
      --bg: #f3f6fb;
      --card-shadow: 0 8px 30px rgba(17, 24, 39, .08);
    }
    body { background: var(--bg); color: #111827; min-height: 100vh; }
    .sidebar {
      position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
      background: linear-gradient(180deg, #0b1220, #111a2f); color: #e5e7eb;
      padding: 22px 16px; box-shadow: 6px 0 20px rgba(0,0,0,.12); z-index: 1000; overflow-y: auto;
    }
    .brand { display:flex; align-items:center; gap:10px; font-weight:700; color:#fff; margin-bottom:18px; letter-spacing:.3px; }
    .brand i {
      background: linear-gradient(135deg, #0d6efd, #00d4ff);
      width: 34px; height: 34px; border-radius: 10px; display:inline-flex; align-items:center; justify-content:center;
    }
    .nav-link { border-radius:10px; color:#cbd5e1; padding:10px 12px; margin-bottom:6px; cursor:pointer; }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,.09); color:#fff; }
    .main { margin-left: var(--sidebar-w); padding: 24px; }
    .topbar { background:#fff; border-radius:14px; box-shadow:var(--card-shadow); padding:14px 18px; margin-bottom:18px; }
    .card.soft { border:0; border-radius:14px; box-shadow:var(--card-shadow); }
    .stat-icon {
      width:44px; height:44px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; font-size:20px; color:#fff;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .table-wrap { max-height: 68vh; overflow: auto; }
    @media (max-width: 992px) {
      .sidebar { position: static; width: 100%; height: auto; border-radius: 0 0 14px 14px; }
      .main { margin-left: 0; padding: 16px; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><i class="bi bi-collection-play"></i> AutoISO {{ version }}</div>
    <div class="small text-secondary mb-3">原盘封装中控台</div>
    <nav class="nav flex-column" id="sideNav">
      <a class="nav-link active" data-view="viewDashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
      <a class="nav-link" data-view="viewSettings"><i class="bi bi-sliders me-2"></i> 设置管理</a>
      <a class="nav-link" data-view="viewHistory"><i class="bi bi-clock-history me-2"></i> 历史记录</a>
    </nav>
    <hr class="border-secondary">
    <a href="/logout" class="btn btn-outline-light w-100"><i class="bi bi-box-arrow-right me-1"></i> 退出登录</a>
  </aside>

  <main class="main">
    <div class="topbar d-flex justify-content-between align-items-center">
      <div>
        <div class="fw-bold">AutoISO Dashboard</div>
        <div class="text-muted small">封装任务每 2 分钟轮询，上传任务按设定的 Cron 定时执行</div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-dark" id="btnViewLogs"><i class="bi bi-journal-text me-1"></i> 系统日志</button>
        <button class="btn btn-sm btn-outline-primary" id="btnRefreshAll"><i class="bi bi-arrow-clockwise me-1"></i> 刷新</button>
      </div>
    </div>

    <section id="viewDashboard" class="app-view">
      <div class="row g-3 mb-3" id="statsCards">
        <div class="col-md-6 col-xl-4"><div class="card soft h-100"><div class="card-body">加载中...</div></div></div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-xl-6">
          <div class="card soft h-100">
            <div class="card-body">
              <h5 class="card-title mb-3"><i class="bi bi-box-seam me-2"></i>封装状态</h5>
              <div id="packingTasks"></div>
            </div>
          </div>
        </div>
        <div class="col-xl-6">
          <div class="card soft h-100">
            <div class="card-body">
              <h5 class="card-title mb-3"><i class="bi bi-cloud-upload me-2"></i>上传状态</h5>
              <div id="uploadTaskStatus"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card soft">
        <div class="card-body">
          <h5 class="card-title mb-3"><i class="bi bi-list-check me-2"></i>待封装任务</h5>
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>序号</th>
                  <th>节点</th>
                  <th>任务名</th>
                  <th>大小(GB)</th>
                  <th>添加时间</th>
                </tr>
              </thead>
              <tbody id="pendingBody">
                <tr><td colspan="5" class="text-muted text-center">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card soft mt-3">
        <div class="card-body">
          <h5 class="card-title mb-3"><i class="bi bi-cloud-arrow-up me-2"></i>待上传任务</h5>
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>序号</th>
                  <th>节点</th>
                  <th>文件名</th>
                  <th>大小(GB)</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="pendingUploadsBody">
                <tr><td colspan="6" class="text-muted text-center">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <section id="viewSettings" class="app-view d-none">
      <div class="row g-3 mb-3">
        <div class="col-xl-6">
          <div class="card soft h-100">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-hdd-network me-2"></i>qBittorrent 管理</h5>
              <form id="qbForm" class="row g-2 mb-3">
                <input type="hidden" name="qb_id" value="">
                <div class="col-md-6"><input class="form-control" name="alias" placeholder="节点别名" required></div>
                <div class="col-md-6"><input class="form-control" name="url" placeholder="http://qb-host:8080" required></div>
                <div class="col-md-6"><input class="form-control" name="username" placeholder="账号" required></div>
                <div class="col-md-6"><input class="form-control" name="password" type="password" placeholder="密码（编辑时留空则不修改）"></div>
                <div class="col-md-6 d-grid"><button class="btn btn-primary" type="submit" id="qbSubmitBtn"><i class="bi bi-plus-circle me-1"></i><span id="qbSubmitText">添加节点</span></button></div>
                <div class="col-md-6 d-grid"><button class="btn btn-outline-info" type="button" id="btnTestQb"><i class="bi bi-plug me-1"></i>测试连接</button></div>
              </form>
              <div id="qbList"></div>
            </div>
          </div>
        </div>

        <div class="col-xl-6">
          <div class="card soft h-100">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-telegram me-2"></i>Telegram 通知</h5>
              <form id="tgForm" class="row g-2 mb-3">
                <div class="col-12"><input class="form-control mono" name="tg_token" placeholder="Bot Token" required></div>
                <div class="col-12"><input class="form-control mono" name="tg_chat_id" placeholder="Chat ID" required></div>
                <div class="col-12"><input class="form-control mono" name="tg_proxy" placeholder="代理地址 (Proxy)，例如: http://192.168.1.100:7890"></div>
                <div class="col-md-6 d-grid"><button class="btn btn-success" type="submit"><i class="bi bi-floppy me-1"></i>保存并测试</button></div>
                <div class="col-md-6 d-grid"><button class="btn btn-outline-danger" type="button" id="btnClearTg"><i class="bi bi-trash me-1"></i>清空设置</button></div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12">
          <div class="card soft">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-shield-lock me-2"></i>系统设置</h5>
              <form id="systemForm">
                <div class="row">
                  <div class="col-12">
                    <div class="mb-3">
                      <label for="auth_username" class="form-label">用户名</label>
                      <input id="auth_username" class="form-control" name="auth_username" placeholder="请输入登录用户名" required>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="auth_password" class="form-label">新密码</label>
                      <input id="auth_password" class="form-control" type="password" name="auth_password" placeholder="可留空，不修改密码">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="auth_password_confirm" class="form-label">确认新密码</label>
                      <input id="auth_password_confirm" class="form-control" type="password" name="auth_password_confirm" placeholder="再次输入新密码">
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="upload_cron" class="form-label">自动上传时间 (Cron表达式)</label>
                      <input id="upload_cron" class="form-control mono" name="upload_cron" placeholder="例如: 0 2 * * *" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label class="form-label d-block">上传后删除原文件</label>
                      <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="delete_after_upload" name="delete_after_upload">
                        <label class="form-check-label" for="delete_after_upload">上传后删除原文件</label>
                      </div>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="mb-3">
                      <label for="clouddrive_path" class="form-label">CloudDrive 挂载路径</label>
                      <input id="clouddrive_path" class="form-control mono" name="clouddrive_path" placeholder="例如: /CloudNAS/115/电影备份" required>
                    </div>
                  </div>

                  <div class="col-md-4 d-grid">
                    <button class="btn btn-warning" type="submit"><i class="bi bi-save me-1"></i>保存系统设置</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="viewHistory" class="app-view d-none">
      <div class="card soft">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="card-title mb-0"><i class="bi bi-table me-2"></i>封装历史</h5>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-danger" id="btnBatchDelete"><i class="bi bi-trash me-1"></i>批量删除</button>
              <button class="btn btn-sm btn-outline-secondary" id="btnRefreshHistory"><i class="bi bi-arrow-repeat me-1"></i>刷新历史</button>
            </div>
          </div>

          <div class="table-wrap">
            <table class="table table-hover align-middle table-sm">
              <thead class="table-light">
                <tr>
                  <th style="width:40px;"><input type="checkbox" id="historyCheckAll"></th>
                  <th>ID</th>
                  <th>任务名</th>
                  <th>节点</th>
                  <th>状态</th>
                  <th>大小(GB)</th>
                  <th>封装耗时</th>
                  <th>封装开始</th>
                  <th>封装结束</th>
                  <th>上传开始</th>
                  <th>上传结束</th>
                  <th>上传耗时</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="d-flex align-items-center gap-2">
              <label for="pageSizeSelect" class="form-label mb-0">每页</label>
              <select id="pageSizeSelect" class="form-select form-select-sm" style="width:120px;">
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="500">500</option>
                <option value="all">全部</option>
              </select>
            </div>
            <div class="btn-group btn-group-sm" role="group">
              <button class="btn btn-outline-secondary" id="btnPrevPage">上一页</button>
              <button class="btn btn-outline-secondary disabled" id="pageInfo">1 / 1</button>
              <button class="btn btn-outline-secondary" id="btnNextPage">下一页</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="logModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-journal-text me-2"></i>系统运行日志（最近24小时）</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <pre id="logContent" style="max-height: 500px; overflow-y: auto; background: #212529; color: #20c997; padding: 15px; border-radius: 5px;"></pre>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let allHistoryData = [];
  let currentPage = 1;
  let pageSize = 20;
  let logModal = null;

  async function api(url, options = {}) {
    const response = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    const data = await response.json().catch(() => ({}));
    if (response.status === 401) {
      window.location.href = '/login';
      throw new Error('登录已过期');
    }
    if (!response.ok) throw new Error(data.error || '请求失败');
    return data;
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[ch]);
  }

  function showNotification(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const tone = {
      success: 'text-bg-success',
      error: 'text-bg-danger',
      warning: 'text-bg-warning',
      info: 'text-bg-primary',
    }[type] || 'text-bg-primary';

    const node = document.createElement('div');
    node.className = `toast align-items-center border-0 ${tone}`;
    node.role = 'alert';
    node.ariaLive = 'assertive';
    node.ariaAtomic = 'true';
    node.innerHTML = `
      <div class="d-flex">
        <div class="toast-body">${escapeHtml(message)}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    `;
    container.appendChild(node);
    const inst = bootstrap.Toast.getOrCreateInstance(node, { delay: 2600 });
    inst.show();
    node.addEventListener('hidden.bs.toast', () => node.remove());
  }

  function formatSeconds(sec) {
    if (sec === null || sec === undefined) return '-';
    const total = Math.max(0, Number(sec));
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = Math.floor(total % 60);
    if (h > 0) return `${h}h ${m}m ${s}s`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function formatDateTimeCell(value) {
    const raw = String(value || '').trim();
    if (!raw) return '<span class="text-muted">-</span>';
    const [datePart, timePart = ''] = raw.split(' ');
    return `<div class="small">${escapeHtml(datePart || '-')}</div><div class="small text-muted mono">${escapeHtml(timePart || '-')}</div>`;
  }

  function statusBadge(status) {
    if (status === '封装完成，待上传' || status === '待上传') {
      return '<span class="badge rounded-pill text-bg-info px-3 py-2">待上传</span>';
    }
    if (status === '上传中') {
      return '<span class="badge rounded-pill text-bg-warning px-3 py-2">上传中</span>';
    }
    if (status === '已上传至网盘') {
      return '<span class="badge rounded-pill text-bg-success px-3 py-2">已上传</span>';
    }
    if (status === 'Success') return '<span class="badge rounded-pill text-bg-success px-3 py-2">Success</span>';
    if (status === 'Failed') return '<span class="badge rounded-pill text-bg-danger px-3 py-2">Failed</span>';
    return '<span class="badge rounded-pill text-bg-warning px-3 py-2">Processing</span>';
  }

  function switchView(viewId) {
    document.querySelectorAll('.app-view').forEach(view => view.classList.add('d-none'));
    const target = document.getElementById(viewId);
    if (target) target.classList.remove('d-none');
  }

  function getPageSizeValue() {
    return pageSize === 'all' ? Math.max(allHistoryData.length, 1) : Number(pageSize);
  }

  function getTotalPages() {
    const size = getPageSizeValue();
    return Math.max(1, Math.ceil(allHistoryData.length / size));
  }

  function syncHistoryCheckAllState() {
    const all = document.getElementById('historyCheckAll');
    const rowChecks = [...document.querySelectorAll('.history-checkbox')];
    const checkedCount = rowChecks.filter(x => x.checked).length;
    all.checked = rowChecks.length > 0 && checkedCount === rowChecks.length;
    all.indeterminate = checkedCount > 0 && checkedCount < rowChecks.length;
  }

  function renderHistoryPage() {
    const tbody = document.getElementById('historyBody');
    const size = getPageSizeValue();
    const totalPages = getTotalPages();
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    const start = (currentPage - 1) * size;
    const end = start + size;
    const pageRows = allHistoryData.slice(start, end);

    document.getElementById('historyCheckAll').checked = false;
    document.getElementById('historyCheckAll').indeterminate = false;

    if (!pageRows.length) {
      tbody.innerHTML = '<tr><td colspan="12" class="text-center text-muted">暂无历史记录</td></tr>';
    } else {
      tbody.innerHTML = pageRows.map(row => `
        <tr>
          <td><input type="checkbox" class="history-checkbox" value="${row.id}"></td>
          <td>${row.id}</td>
          <td>${escapeHtml(row.task_name)}</td>
          <td>${escapeHtml(row.qb_server_name || '')}</td>
          <td class="text-center">${statusBadge(row.status)}</td>
          <td>${Number(row.file_size_gb || 0).toFixed(2)}</td>
          <td>${formatSeconds(row.duration_seconds)}</td>
          <td>${formatDateTimeCell(row.start_time || '')}</td>
          <td>${formatDateTimeCell(row.end_time || '')}</td>
          <td>${formatDateTimeCell(row.upload_start_time || '')}</td>
          <td>${formatDateTimeCell(row.upload_end_time || '')}</td>
          <td>${formatSeconds(row.upload_duration_seconds)}</td>
        </tr>
      `).join('');
      document.querySelectorAll('.history-checkbox').forEach(cb => cb.addEventListener('change', syncHistoryCheckAllState));
    }

    document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
    document.getElementById('btnPrevPage').disabled = currentPage <= 1;
    document.getElementById('btnNextPage').disabled = currentPage >= totalPages;
  }

  async function fetchHistory(fromPolling = false) {
    if (fromPolling && document.querySelectorAll('.history-checkbox:checked').length > 0) return;
    const list = await api('/api/history?limit=0');
    allHistoryData = list;
    renderHistoryPage();
  }

  async function batchDeleteHistory() {
    const ids = [...document.querySelectorAll('.history-checkbox:checked')].map(x => Number(x.value));
    if (!ids.length) {
      showNotification('请先选择要删除的记录');
      return;
    }
    if (!confirm('确定要删除选中的记录吗？')) return;
    await api('/api/history/delete', { method: 'POST', body: JSON.stringify({ ids }) });
    await fetchHistory(false);
  }

  async function loadStats() {
    const stats = await api('/api/stats');
    const pack = stats.pack || {};
    const upload = stats.upload || {};
    document.getElementById('statsCards').innerHTML = `
      <div class="col-12">
        <div class="row g-3 align-items-stretch">
          <div class="col-md-2">
            <div class="card soft h-100 d-flex justify-content-center align-items-center">
              <div class="fw-bold fs-5 text-primary">封装</div>
            </div>
          </div>
          <div class="col-md-10">
            <div class="row g-3">
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">总次数</div><div class="fw-bold fs-5">${pack.total_count || 0}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">总数据</div><div class="fw-bold">${escapeHtml(pack.total_size_text || '0.00 GB')}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">平均耗时</div><div class="fw-bold">${escapeHtml(pack.avg_duration_text || '-')}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">平均速率</div><div class="fw-bold">${escapeHtml(pack.avg_rate_text || '0 MB/s')}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">本月次数</div><div class="fw-bold fs-5">${pack.month_count || 0}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">本月数据</div><div class="fw-bold">${escapeHtml(pack.month_size_text || '0.00 GB')}</div></div></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12">
        <div class="row g-3 align-items-stretch">
          <div class="col-md-2">
            <div class="card soft h-100 d-flex justify-content-center align-items-center">
              <div class="fw-bold fs-5 text-success">上传</div>
            </div>
          </div>
          <div class="col-md-10">
            <div class="row g-3">
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">总次数</div><div class="fw-bold fs-5">${upload.total_count || 0}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">总数据</div><div class="fw-bold">${escapeHtml(upload.total_size_text || '0.00 GB')}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">平均耗时</div><div class="fw-bold">${escapeHtml(upload.avg_duration_text || '-')}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">平均速率</div><div class="fw-bold">${escapeHtml(upload.avg_rate_text || '0 MB/s')}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">本月次数</div><div class="fw-bold fs-5">${upload.month_count || 0}</div></div></div></div>
              <div class="col-6 col-lg-4 col-xxl-2"><div class="card soft h-100"><div class="card-body"><div class="text-muted small">本月数据</div><div class="fw-bold">${escapeHtml(upload.month_size_text || '0.00 GB')}</div></div></div></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  async function loadProgress() {
    const [packData, stats] = await Promise.all([api('/api/progress'), api('/api/stats')]);

    const packingBox = document.getElementById('packingTasks');
    if (!packData.active || !packData.tasks.length) {
      packingBox.innerHTML = '<div class="text-muted">No active packing task</div>';
    } else {
      packingBox.innerHTML = packData.tasks.map(task => `
        <div class="border rounded p-3 mb-2 bg-light-subtle">
          <div class="mb-2">
            <div class="fw-semibold">Packing: ${escapeHtml(task.task_name)}</div>
            <div class="small text-muted">Node: ${escapeHtml(task.server_name)} | Elapsed: ${formatSeconds(task.elapsed_seconds)}</div>
          </div>
          <div class="progress" role="progressbar" aria-valuenow="${task.progress}" aria-valuemin="0" aria-valuemax="100" style="height: 12px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:${task.progress}%"></div>
          </div>
          <div class="small text-muted mt-2">Speed: ${Number(task.speed_mbps || 0).toFixed(2)} MB/s | ETA: ${escapeHtml(task.eta_text || '-')} | Progress: ${Number(task.progress || 0).toFixed(2)}%</div>
        </div>
      `).join('');
    }

    const up = stats.upload_progress || {};
    const currentUploadStatus = stats.current_upload_status || {};
    const uploadBox = document.getElementById('uploadTaskStatus');
    if (!up.active) {
      uploadBox.innerHTML = '<div class="text-muted">No active upload task</div>';
      return;
    }

    const pct = Number(up.percentage || 0).toFixed(2);
    const uploadPaused = currentUploadStatus.status === 'paused' || up.status === 'paused';
    const action = uploadPaused ? 'resume' : 'pause';
    const actionText = uploadPaused ? 'Resume' : 'Pause';
    const cardTone = uploadPaused ? 'bg-secondary-subtle' : 'bg-warning-subtle';
    const barTone = uploadPaused ? 'bg-secondary' : 'bg-warning';
    const statusText = uploadPaused ? 'Paused' : 'Uploading';
    const spinner = uploadPaused ? '' : '<span class="spinner-border spinner-border-sm text-warning" role="status" aria-hidden="true"></span>';
    uploadBox.innerHTML = `
      <div class="border rounded p-3 ${cardTone}">
        <div class="mb-2">
          <div class="fw-semibold d-flex align-items-center gap-2">
            ${spinner}
            <span>${statusText}: ${escapeHtml(up.file_name || '')}</span>
          </div>
        </div>
        <div class="progress" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100" style="height: 12px;">
          <div class="progress-bar ${barTone}" style="width:${pct}%"></div>
        </div>
        <div class="small text-muted mt-2 d-flex justify-content-between align-items-center gap-2 flex-wrap">
          <span>Speed: ${Number(up.speed_mbps || 0).toFixed(2)} MB/s | ETA: ${escapeHtml(up.eta || '-')} | Progress: ${pct}%</span>
          <button type="button" class="btn btn-sm ${uploadPaused ? 'btn-success' : 'btn-outline-warning'}" onclick="toggleUploadControl('${action}')">${actionText}</button>
        </div>
      </div>
    `;
  }

  async function loadPending() {
    const rows = await api('/api/pending');
    const tbody = document.getElementById('pendingBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-muted text-center">暂无待封装任务</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map((row, index) => `
      <tr>
        <td>${index + 1}</td>
        <td>${escapeHtml(row.node_alias || '')}</td>
        <td>${escapeHtml(row.title)}</td>
        <td>${Number(row.size_gb || 0).toFixed(2)}</td>
        <td>${escapeHtml(row.added_on || '')}</td>
      </tr>
    `).join('');
  }

  async function loadPendingUploads() {
    const [rows, stats] = await Promise.all([api('/api/pending_uploads'), api('/api/stats')]);
    const currentUploading = stats.current_uploading_file || '';
    const tbody = document.getElementById('pendingUploadsBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-muted text-center">暂无待上传任务</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map((row, index) => `
      <tr>
        <td>${index + 1}</td>
        <td>${escapeHtml(row.node || 'NAS')}</td>
        <td>${escapeHtml(row.filename || '')}</td>
        <td>${Number(row.size || row.size_gb || 0).toFixed(2)}</td>
        <td>${(row.status || '') === 'uploaded'
          ? '<span class="badge rounded-pill bg-success px-3 py-2">已上传</span>'
          : '<span class="badge rounded-pill bg-secondary px-3 py-2">待上传</span>'
        }</td>
        <td>
          <button
            class="btn btn-sm ${(row.status || '') === 'uploaded' ? 'btn-warning' : 'btn-outline-primary'}"
            ${(row.filename || '') === currentUploading ? 'disabled' : ''}
            onclick="uploadNow('${encodeURIComponent(row.filename || '')}')"
          >
            ${(row.filename || '') === currentUploading ? '上传中' : ((row.status || '') === 'uploaded' ? '重新上传' : '立即上传')}
          </button>
        </td>
      </tr>
    `).join('');
  }

  async function uploadNow(encodedName) {
    try {
      const name = decodeURIComponent(encodedName || '');
      if (!name) return;
      await api(`/api/upload_now/${encodeURIComponent(name)}`, { method: 'POST' });
      await loadProgress();
      showNotification('上传任务已触发', 'success');
    } catch (err) {
      showNotification(err.message, 'error');
    }
  }

  async function toggleUploadControl(action) {
    try {
      await api('/api/upload/control', {
        method: 'POST',
        body: JSON.stringify({ action }),
      });
      showNotification(action === 'pause' ? 'Upload paused' : 'Upload resumed', 'success');
      await loadProgress();
    } catch (err) {
      showNotification(err.message, 'error');
    }
  }

  function setQbFormMode(isEdit) {
    const btn = document.getElementById('qbSubmitBtn');
    const text = document.getElementById('qbSubmitText');
    const icon = btn.querySelector('i');
    if (isEdit) {
      btn.classList.remove('btn-primary');
      btn.classList.add('btn-warning');
      text.textContent = '保存修改';
      icon.className = 'bi bi-check2-circle me-1';
    } else {
      btn.classList.remove('btn-warning');
      btn.classList.add('btn-primary');
      text.textContent = '添加节点';
      icon.className = 'bi bi-plus-circle me-1';
    }
  }

  function resetQbForm() {
    const form = document.getElementById('qbForm');
    form.reset();
    form.qb_id.value = '';
    setQbFormMode(false);
  }

  async function loadServers() {
    const rows = await api('/api/qbservers');
    const el = document.getElementById('qbList');
    if (!rows.length) {
      el.innerHTML = '<div class="text-muted">暂无节点</div>';
      return;
    }
    el.innerHTML = rows.map(row => `
      <div class="border rounded p-2 mb-2 bg-white d-flex justify-content-between align-items-start">
        <div><div class="fw-semibold">${escapeHtml(row.name)}</div><div class="small text-muted mono">${escapeHtml(row.url)}</div><div class="small text-muted">账号: ${escapeHtml(row.username)}</div></div>
        <div class="d-flex gap-1">
          <button class="btn btn-sm btn-outline-primary" onclick='editServer(${JSON.stringify(row)})'><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteServer(${row.id})"><i class="bi bi-trash"></i></button>
        </div>
      </div>
    `).join('');
  }

  function editServer(row) {
    const form = document.getElementById('qbForm');
    form.qb_id.value = row.id;
    form.alias.value = row.name || '';
    form.url.value = row.url || '';
    form.username.value = row.username || '';
    form.password.value = '';
    setQbFormMode(true);
  }

  async function deleteServer(id) {
    if (!confirm('确认删除该 qB 节点？')) return;
    await api(`/api/qbservers/${id}`, { method: 'DELETE' });
    await loadServers();
    resetQbForm();
  }

  async function loadTgSettings() {
    const data = await api('/api/settings/telegram');
    const form = document.getElementById('tgForm');
    form.tg_token.value = data.tg_token || '';
    form.tg_chat_id.value = data.tg_chat_id || '';
    form.tg_proxy.value = data.tg_proxy || '';
  }

  async function loadSystemSettings() {
    const data = await api('/api/settings/system');
    const form = document.getElementById('systemForm');
    form.auth_username.value = data.auth_username || '';
    form.auth_password.value = '';
    form.auth_password_confirm.value = '';
    form.upload_cron.value = data.upload_cron || '0 2 * * *';
    form.clouddrive_path.value = data.clouddrive_path || '/CloudNAS/115/电影备份';
    form.delete_after_upload.checked = !!data.delete_after_upload;
  }

  async function loadLogs() {
    const pre = document.getElementById('logContent');
    pre.textContent = '日志加载中...';
    const data = await api('/api/logs');
    const lines = Array.isArray(data.logs) ? data.logs : [];
    pre.textContent = lines.length ? lines.join('\n\n') : '最近24小时暂无日志';
  }

  async function refreshAll() {
    try {
      await Promise.all([
        loadStats(),
        loadProgress(),
        loadPending(),
        loadPendingUploads(),
        loadServers(),
        loadTgSettings(),
        loadSystemSettings(),
        fetchHistory(false),
      ]);
    } catch (err) {
      showNotification(err.message);
    }
  }

  document.getElementById('qbForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const f = event.target;
    const qbId = (f.qb_id.value || '').trim();
    const alias = (f.alias.value || '').trim();
    const url = (f.url.value || '').trim();
    const username = (f.username.value || '').trim();
    const password = (f.password.value || '').trim();

    if (!alias || !url || !username) {
      showNotification('请完整填写节点信息');
      return;
    }

    if (qbId) {
      await api('/api/qb/update', {
        method: 'POST',
        body: JSON.stringify({ id: Number(qbId), alias, url, username, password }),
      });
      showNotification('节点修改成功');
    } else {
      if (!password) {
        showNotification('新增节点时密码不能为空');
        return;
      }
      await api('/api/qbservers', {
        method: 'POST',
        body: JSON.stringify({ name: alias, url, username, password }),
      });
      showNotification('节点添加成功');
    }

    resetQbForm();
    await loadServers();
  });

  document.getElementById('btnTestQb').addEventListener('click', async () => {
    const f = document.getElementById('qbForm');
    try {
      const data = await api('/api/qb/test', {
        method: 'POST',
        body: JSON.stringify({ url: f.url.value, username: f.username.value, password: f.password.value }),
      });
      showNotification(data.message || '连接成功');
    } catch (err) {
      showNotification(err.message);
    }
  });

  document.getElementById('tgForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const f = event.target;
    await api('/api/settings/telegram', {
      method: 'POST',
      body: JSON.stringify({ tg_token: f.tg_token.value, tg_chat_id: f.tg_chat_id.value, tg_proxy: f.tg_proxy.value }),
    });
    showNotification('Telegram 设置已保存并发送测试消息');
  });

  document.getElementById('btnClearTg').addEventListener('click', async () => {
    if (!confirm('确认清空 Telegram 配置？')) return;
    await api('/api/settings/telegram', { method: 'DELETE' });
    await loadTgSettings();
  });

  document.getElementById('systemForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const f = event.target;
    const password = (f.auth_password.value || '').trim();
    const confirm = (f.auth_password_confirm.value || '').trim();
    if ((password || confirm) && password !== confirm) {
      showNotification('两次密码输入不一致');
      return;
    }

    await api('/api/settings/system', {
      method: 'POST',
      body: JSON.stringify({
        auth_username: f.auth_username.value,
        auth_password: password,
        auth_password_confirm: confirm,
        upload_cron: f.upload_cron.value,
        clouddrive_path: f.clouddrive_path.value,
        delete_after_upload: !!f.delete_after_upload.checked,
      }),
    });
    f.auth_password.value = '';
    f.auth_password_confirm.value = '';
    showNotification('系统设置已保存，Cron 调度已生效');
  });

  document.getElementById('btnRefreshAll').addEventListener('click', refreshAll);
  document.getElementById('btnRefreshHistory').addEventListener('click', () => fetchHistory(false));
  document.getElementById('btnBatchDelete').addEventListener('click', batchDeleteHistory);

  document.getElementById('historyCheckAll').addEventListener('change', (event) => {
    const checked = event.target.checked;
    document.querySelectorAll('.history-checkbox').forEach(cb => { cb.checked = checked; });
    syncHistoryCheckAllState();
  });

  document.getElementById('pageSizeSelect').addEventListener('change', (event) => {
    pageSize = event.target.value === 'all' ? 'all' : Number(event.target.value);
    currentPage = 1;
    renderHistoryPage();
  });

  document.getElementById('btnPrevPage').addEventListener('click', () => {
    if (currentPage > 1) {
      currentPage -= 1;
      renderHistoryPage();
    }
  });

  document.getElementById('btnNextPage').addEventListener('click', () => {
    const totalPages = getTotalPages();
    if (currentPage < totalPages) {
      currentPage += 1;
      renderHistoryPage();
    }
  });

  document.querySelectorAll('#sideNav .nav-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('#sideNav .nav-link').forEach(x => x.classList.remove('active'));
      link.classList.add('active');
      switchView(link.dataset.view);
    });
  });

  document.getElementById('btnViewLogs').addEventListener('click', async () => {
    try {
      await loadLogs();
      logModal.show();
    } catch (err) {
      showNotification(err.message);
    }
  });

  logModal = new bootstrap.Modal(document.getElementById('logModal'));

  refreshAll();
  setInterval(loadProgress, 3000);
  setInterval(loadPending, 10000);
  setInterval(loadPendingUploads, 10000);
  setInterval(loadStats, 10000);
  setInterval(() => fetchHistory(true), 10000);
</script>
</body>
</html>
