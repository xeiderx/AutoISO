<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoISO {{ version }} 登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, #1e3c72 0%, #2a5298 40%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border: 0;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .25);
      background: rgba(255, 255, 255, .97);
    }
    .brand {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d6efd, #0dcaf0);
      color: #fff;
      font-size: 24px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="brand"><i class="bi bi-hdd-stack"></i></div>
        <h4 class="mb-1">AutoISO {{ version }}</h4>
        <div class="text-muted small">自动化原盘封装控制台</div>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="vstack gap-3">
        <div>
          <label class="form-label">账号</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input class="form-control" name="username" required autofocus>
          </div>
        </div>

        <div>
          <label class="form-label">密码</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input class="form-control" name="password" type="password" required>
          </div>
        </div>

        <button class="btn btn-primary btn-lg" type="submit">
          <i class="bi bi-box-arrow-in-right me-1"></i> 登录
        </button>
      </form>
    </div>
  </div>
</body>
</html>
