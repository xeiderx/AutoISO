<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoISO {{ version }} - 历史记录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f7fb; }
    .wrap { max-width: 1600px; margin: 18px auto; padding: 0 12px; }
    .card { border: 0; border-radius: 14px; box-shadow: 0 8px 24px rgba(15,23,42,.06); }
    .table { width: 100%; }
    .table-responsive { overflow-x: auto; }
    .table th { white-space: nowrap !important; word-break: keep-all !important; overflow-wrap: normal !important; vertical-align: middle; }
    .table td { white-space: normal; word-break: break-all; overflow-wrap: anywhere; vertical-align: middle; }
    .time-col { white-space: nowrap !important; word-break: normal !important; }
    .time-cell span { white-space: nowrap !important; word-break: normal !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h4 class="mb-0">历史记录</h4>
      <a href="/" class="btn btn-outline-secondary btn-sm">返回首页</a>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="d-flex justify-content-end align-items-center mb-2">
          <div class="input-group input-group-sm w-auto d-inline-flex me-2">
              <span class="input-group-text rounded-start-pill bg-transparent border-end-0 pe-2">
                  <i class="bi bi-search text-muted"></i>
              </span>
              <input type="text" id="historySearch" class="form-control rounded-end-pill border-start-0 ps-1 shadow-none" placeholder="搜索任务名、节点或状态...">
          </div>
        </div>
      </div>
      <div class="card-body table-responsive pt-0">
        <table id="historyTable" class="table table-sm table-hover resizable-table align-middle" style="min-width: 1200px;">
          <thead>
            <colgroup><col style="width:3%"><col style="width:40%"><col style="width:6%"><col style="width:8%"><col style="width:7%"><col style="width:9%"><col style="width:6%"><col style="width:6%"><col style="width:6%"><col style="width:6%"><col style="width:9%"></colgroup>
            <tr>
                <th class="text-center align-middle" style="white-space: nowrap;">ID</th>
                <th class="align-middle" style="white-space: nowrap;">任务名</th>
                <th class="text-center align-middle" style="white-space: nowrap;">节点</th>
                <th class="text-center align-middle" style="white-space: nowrap;">状态</th>
                <th class="text-center align-middle" style="white-space: nowrap;">大小<br><small class="fw-normal text-muted">(GB)</small></th>
                <th class="align-middle" style="white-space: nowrap;">封装耗时</th>
                <th class="align-middle" style="white-space: nowrap;">封装开始</th>
                <th class="align-middle" style="white-space: nowrap;">封装结束</th>
                <th class="align-middle" style="white-space: nowrap;">上传开始</th>
                <th class="align-middle" style="white-space: nowrap;">上传结束</th>
                <th class="align-middle" style="white-space: nowrap;">上传耗时</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
    function fmtSec(sec){if(sec===null||sec===undefined||Number.isNaN(Number(sec)))return '-';const n=Math.max(0,Number(sec));const h=Math.floor(n/3600),m=Math.floor((n%3600)/60),s=Math.floor(n%60);if(h>0)return `${h}h ${m}m ${s}s`;if(m>0)return `${m}m ${s}s`;return `${s}s`;}
    function fmtDt(raw){const txt=String(raw||'').trim();if(!txt)return '<span class="small text-muted">-</span>';const p=txt.split(' ');return `<div class="small text-secondary time-cell"><span class="d-inline-block">${esc(p[0]||'-')}</span><br><span class="d-inline-block">${esc(p[1]||'-')}</span></div>`;}
    function badge(s){s=String(s||'').trim();if(s==='已上传至网盘')return '<span class="badge rounded-pill text-bg-success">已上传</span>';if(s==='上传中')return '<span class="badge rounded-pill text-bg-warning">上传中</span>';if(s==='封装完成，待上传')return '<span class="badge rounded-pill text-bg-secondary">待上传</span>';if(s==='中止上传')return '<span class="badge rounded-pill text-bg-danger">已中止</span>';if(s==='本地已删除')return '<span class="badge rounded-pill text-bg-dark">本地已删除</span>';if(s==='Failed')return '<span class="badge rounded-pill text-bg-danger">失败</span>';return `<span class="badge rounded-pill text-bg-info">${esc(s||'处理中')}</span>`;}
    function filterHistoryRows(){const keyword=String(($('historySearch')?.value)||'').trim().toLowerCase();document.querySelectorAll('#historyBody tr').forEach(tr=>{const txt=String(tr.innerText||'').toLowerCase();tr.style.display=!keyword||txt.includes(keyword)?'':'none';});}
    async function loadHistory(){const r=await fetch('/api/history?limit=0');const rows=await r.json().catch(()=>[]);$('historyBody').innerHTML=(rows||[]).length?rows.map(x=>`<tr><td class="small text-secondary align-middle text-center">${x.id}</td><td class="small text-secondary align-middle" title="${esc(x.task_name||'')}">${esc(x.task_name||'')}</td><td class="small text-secondary align-middle text-center">${esc(x.qb_server_name||'-')}</td><td class="align-middle text-center">${badge(x.status)}</td><td class="small text-secondary align-middle text-center">${Number(x.file_size_gb||0).toFixed(2)}</td><td class="small text-secondary align-middle text-nowrap">${fmtSec(x.duration_seconds)}</td><td class="small text-secondary align-middle time-col text-nowrap">${fmtDt(x.start_time)}</td><td class="small text-secondary align-middle time-col text-nowrap">${fmtDt(x.end_time)}</td><td class="small text-secondary align-middle time-col text-nowrap">${fmtDt(x.upload_start_time)}</td><td class="small text-secondary align-middle time-col text-nowrap">${fmtDt(x.upload_end_time)}</td><td class="small text-secondary align-middle text-nowrap">${fmtSec(x.upload_duration_seconds)}</td></tr>`).join(''):'<tr><td colspan="11" class="text-center text-muted">暂无数据</td></tr>';filterHistoryRows();}
    $('historySearch').addEventListener('input', filterHistoryRows);
    loadHistory();
  </script>
</body>
</html>
