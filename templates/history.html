<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AutoISO {{ version }} 历史记录</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background:#f3f6fb}.wrap{max-width:1500px;margin:24px auto;padding:0 12px}.card{border:0;border-radius:14px;box-shadow:0 8px 30px rgba(17,24,39,.08)}.table th,.table td{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}.table thead th{position:relative}.col-resize-handle{position:absolute;right:0;top:0;width:8px;height:100%;cursor:col-resize}.cell-date{display:block}.cell-time{display:block;color:#6b7280;font-family:monospace}</style></head><body><div class="wrap"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">历史记录</h4><a href="/" class="btn btn-outline-secondary btn-sm">返回 Dashboard</a></div><div class="card"><div class="card-body table-responsive"><table id="historyTable" class="table table-sm table-hover align-middle mb-0"><thead class="table-light"><tr><th>ID</th><th>任务名</th><th>节点</th><th>状态</th><th>大小(GB)</th><th>封装耗时</th><th>封装开始</th><th>封装结束</th><th>上传开始</th><th>上传结束</th><th>上传耗时</th></tr></thead><tbody id="historyBody"><tr><td colspan="11" class="text-center text-muted">加载中...</td></tr></tbody></table></div></div></div><script>function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}function fmtS(s){if(s===null||s===undefined)return '-';s=Math.max(0,Number(s));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=Math.floor(s%60);return h>0?`${h}h ${m}m ${x}s`:(m>0?`${m}m ${x}s`:`${x}s`)}function fmtDT(v){const r=String(v||'').trim();if(!r)return '<span class="text-muted">-</span>';const[a,b='']=r.split(' ');return `<span class="cell-date">${esc(a)}</span><span class="cell-time">${esc(b||'-')}</span>`}function badge(s){if(s==='封装完成，待上传'||s==='待上传')return '<span class="badge rounded-pill text-bg-info px-3 py-2">待上传</span>';if(s==='上传中')return '<span class="badge rounded-pill text-bg-warning px-3 py-2">上传中</span>';if(s==='已上传至网盘')return '<span class="badge rounded-pill text-bg-success px-3 py-2">已上传</span>';if(s==='Failed')return '<span class="badge rounded-pill text-bg-danger px-3 py-2">失败</span>';if(s==='本地已删除')return '<span class="badge rounded-pill text-bg-dark px-3 py-2">本地已删除</span>';return `<span class="badge rounded-pill text-bg-secondary px-3 py-2">${esc(s||'处理中')}</span>`}async function load(){const r=await fetch('/api/history?limit=0');const rows=await r.json().catch(()=>[]);const tb=document.getElementById('historyBody');tb.innerHTML=!Array.isArray(rows)||!rows.length?'<tr><td colspan="11" class="text-center text-muted">暂无历史记录</td></tr>':rows.map(x=>`<tr><td>${x.id}</td><td>${esc(x.task_name||'')}</td><td>${esc(x.qb_server_name||'')}</td><td class='text-center'>${badge(x.status)}</td><td>${Number(x.file_size_gb||0).toFixed(2)}</td><td>${fmtS(x.duration_seconds)}</td><td>${fmtDT(x.start_time||'')}</td><td>${fmtDT(x.end_time||'')}</td><td>${fmtDT(x.upload_start_time||'')}</td><td>${fmtDT(x.upload_end_time||'')}</td><td>${fmtS(x.upload_duration_seconds)}</td></tr>`).join('')}function initResize(){const t=document.getElementById('historyTable');(t.querySelectorAll('thead th')||[]).forEach((th,i)=>{const k=`col-width:historyTable:${i}`,s=localStorage.getItem(k);if(s){th.style.width=`${Number(s)}px`;th.style.minWidth=`${Number(s)}px`}const h=document.createElement('span');h.className='col-resize-handle';th.appendChild(h);h.onmousedown=e=>{e.preventDefault();const sx=e.clientX,sw=th.offsetWidth,mv=ev=>{const w=Math.max(80,sw+ev.clientX-sx);th.style.width=`${w}px`;th.style.minWidth=`${w}px`},up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);localStorage.setItem(k,String(th.offsetWidth))};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)}})}initResize();load();</script></body></html>
